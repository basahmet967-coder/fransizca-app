            { tr: "Düşünmek", inf: "penser", conjugations: { pres: ["pense", "penses", "pense", "pensons", "pensez", "pensent"], pc: ["ai pensé", "as pensé", "a pensé", "avons pensé", "avez pensé", "ont pensé"], imp: ["pensais", "pensais", "pensait", "pensions", "pensiez", "pensaient"], fut: ["penserai", "penseras", "pensera", "penserons", "penserez", "penseront"], subj: ["pense", "penses", "pense", "pensions", "pensiez", "pensent"], cond: ["penserais", "penserais", "penserait", "penserions", "penseriez", "penseraient"] } },
            { tr: "Kaybetmek", inf: "perdre", conjugations: { pres: ["perds", "perds", "perd", "perdons", "perdez", "perdent"], pc: ["ai perdu", "as perdu", "a perdu", "avons perdu", "avez perdu", "ont perdu"], imp: ["perdais", "perdais", "perdait", "perdions", "perdiez", "perdaient"], fut: ["perdrai", "perdras", "perdra", "perdrons", "perdrez", "perdront"], subj: ["perde", "perdes", "perde", "perdions", "perdiez", "perdent"], cond: ["perdrais", "perdrais", "perdrait", "perdrions", "perdriez", "perdraient"] } },
            { tr: "Yapabilmek", inf: "pouvoir", conjugations: { pres: ["peux", "peux", "peut", "pouvons", "pouvez", "peuvent"], pc: ["ai pu", "as pu", "a pu", "avons pu", "avez pu", "ont pu"], imp: ["pouvais", "pouvais", "pouvait", "pouvions", "pouviez", "pouvaient"], fut: ["pourrai", "pourras", "pourra", "pourrons", "pourrez", "pourront"], subj: ["puisse", "puisses", "puisse", "puissions", "puissiez", "puissent"], cond: ["pourrais", "pourrais", "pourrait", "pourrions", "pourriez", "pourraient"] } },
            { tr: "Almak", inf: "prendre", conjugations: { pres: ["prends", "prends", "prend", "prenons", "prenez", "prennent"], pc: ["ai pris", "as pris", "a pris", "avons pris", "avez pris", "ont pris"], imp: ["prenais", "prenais", "prenait", "prenions", "preniez", "prenaient"], fut: ["prendrai", "prendras", "prendra", "prendrons", "prendrez", "prendront"], subj: ["prenne", "prennes", "prenne", "prenions", "preniez", "prennent"], cond: ["prendrais", "prendrais", "prendrait", "prendrions", "prendriez", "prendraient"] } },
            { tr: "Bakmak", inf: "regarder", conjugations: { pres: ["regarde", "regardes", "regarde", "regardons", "regardez", "regardent"], pc: ["ai regardé", "as regardé", "a regardé", "avons regardé", "avez regardé", "ont regardé"], imp: ["regardais", "regardais", "regardait", "regardions", "regardiez", "regardaient"], fut: ["regarderai", "regarderas", "regardera", "regarderons", "regarderez", "regarderont"], subj: ["regarde", "regardes", "regarde", "regardions", "regardiez", "regardent"], cond: ["regarderais", "regarderais", "regarderait", "regarderions", "regarderiez", "regarderaient"] } },
            { tr: "Geri Vermek / İade", inf: "rendre", conjugations: { pres: ["rends", "rends", "rend", "rendons", "rendez", "rendent"], pc: ["ai rendu", "as rendu", "a rendu", "avons rendu", "avez rendu", "ont rendu"], imp: ["rendais", "rendais", "rendait", "rendions", "rendiez", "rendaient"], fut: ["rendrai", "rendras", "rendra", "rendrons", "rendrez", "rendront"], subj: ["rende", "rendes", "rende", "rendions", "rendiez", "rendent"], cond: ["rendrais", "rendrais", "rendrait", "rendrions", "rendriez", "rendraient"] } },
            { tr: "Geri Dönmek / Eve Dönmek", inf: "rentrer", conjugations: { pres: ["rentre", "rentres", "rentre", "rentrons", "rentrez", "rentrent"], pc: ["suis rentré", "es rentré", "est rentré", "sommes rentrés", "êtes rentrés", "sont rentrés"], imp: ["rentrais", "rentrais", "rentrait", "rentrions", "rentriez", "rentraient"], fut: ["rentrerai", "rentreras", "rentrera", "rentrerons", "rentrerez", "rentreront"], subj: ["rentre", "rentres", "rentre", "rentrions", "rentriez", "rentrent"], cond: ["rentrerais", "rentrerais", "rentrerait", "rentrerions", "rentreriez", "rentreraient"] } },
            { tr: "Kalmak", inf: "rester", conjugations: { pres: ["reste", "restes", "reste", "restons", "restez", "restent"], pc: ["suis resté", "es resté", "est resté", "sommes restés", "êtes restés", "sont restés"], imp: ["restais", "restais", "restait", "restions", "restiez", "restaient"], fut: ["resterai", "resteras", "restera", "resterons", "resterez", "resteront"], subj: ["reste", "restes", "reste", "restions", "restiez", "restent"], cond: ["resterais", "resterais", "resterait", "resterions", "resteriez", "resteraient"] } },
            { tr: "Bilmek", inf: "savoir", conjugations: { pres: ["sais", "sais", "sait", "savons", "savez", "savent"], pc: ["ai su", "as su", "a su", "avons su", "avez su", "ont su"], imp: ["savais", "savais", "savait", "savions", "saviez", "savaient"], fut: ["saurai", "sauras", "saura", "saurons", "saurez", "sauront"], subj: ["sache", "saches", "sache", "sachions", "sachiez", "sachent"], cond: ["saurais", "saurais", "saurait", "saurions", "sauriez", "sauraient"] } },
            { tr: "Hissetmek", inf: "sentir", conjugations: { pres: ["sens", "sens", "sent", "sentons", "sentez", "sentent"], pc: ["ai senti", "as senti", "a senti", "avons senti", "avez senti", "ont senti"], imp: ["sentais", "sentais", "sentait", "sentions", "sentiez", "sentaient"], fut: ["sentirai", "sentiras", "sentira", "sentirons", "sentirez", "sentiront"], subj: ["sente", "sentes", "sente", "sentions", "sentiez", "sentent"], cond: ["sentirais", "sentirais", "sentirait", "sentirions", "sentiriez", "sentiraient"] } },
            { tr: "Dışarı Çıkmak", inf: "sortir", conjugations: { pres: ["sors", "sors", "sort", "sortons", "sortez", "sortent"], pc: ["suis sorti", "es sorti", "est sorti", "sommes sortis", "êtes sortis", "sont sortis"], imp: ["sortais", "sortais", "sortait", "sortions", "sortiez", "sortaient"], fut: ["sortirai", "sortiras", "sortira", "sortirons", "sortirez", "sortiront"], subj: ["sorte", "sortes", "sorte", "sortions", "sortiez", "sortent"], cond: ["sortirais", "sortirais", "sortirait", "sortirions", "sortiriez", "sortiraient"] } },
            { tr: "Tutmak", inf: "tenir", conjugations: { pres: ["tiens", "tiens", "tient", "tenons", "tenez", "tiennent"], pc: ["ai tenu", "as tenu", "a tenu", "avons tenu", "avez tenu", "ont tenu"], imp: ["tenais", "tenais", "tenait", "tenions", "teniez", "tenaient"], fut: ["tiendrai", "tiendras", "tiendra", "tiendrons", "tiendrez", "tiendront"], subj: ["tienne", "tiennes", "tienne", "tenions", "teniez", "tiennent"], cond: ["tiendrais", "tiendrais", "tiendrait", "tiendrions", "tiendriez", "tiendraient"] } },
            { tr: "Çalışmak", inf: "travailler", conjugations: { pres: ["travaille", "travailles", "travaille", "travaillons", "travaillez", "travaillent"], pc: ["ai travaillé", "as travaillé", "a travaillé", "avons travaillé", "avez travaillé", "ont travaillé"], imp: ["travaillais", "travaillais", "travaillait", "travaillions", "travailliez", "travaillaient"], fut: ["travaillerai", "travailleras", "travaillera", "travaillerons", "travaillerez", "travailleront"], subj: ["travaille", "travailles", "travaille", "travaillions", "travailliez", "travaillent"], cond: ["travaillerais", "travaillerais", "travaillerait", "travaillerions", "travailleriez", "travaillaient"] } },
            { tr: "Bulmak", inf: "trouver", conjugations: { pres: ["trouve", "trouves", "trouve", "trouvons", "trouvez", "trouvent"], pc: ["ai trouvé", "as trouvé", "a trouvé", "avons trouvé", "avez trouvé", "ont trouvé"], imp: ["trouvais", "trouvais", "trouvait", "trouvions", "trouviez", "trouvaient"], fut: ["trouverai", "trouveras", "trouvera", "trouverons", "trouverez", "trouveront"], subj: ["trouve", "trouves", "trouve", "trouvions", "trouviez", "trouvent"], cond: ["trouverais", "trouverais", "trouverait", "trouverions", "trouveriez", "trouveraient"] } },
            { tr: "Gelmek", inf: "venir", conjugations: { pres: ["viens", "viens", "vient", "venons", "venez", "viennent"], pc: ["suis venu", "es venu", "est venu", "sommes venus", "êtes venus", "sont venus"], imp: ["venais", "venais", "venait", "venions", "veniez", "venaient"], fut: ["viendrai", "viendras", "viendra", "viendrons", "viendrez", "viendront"], subj: ["vienne", "viennes", "vienne", "venions", "veniez", "viennent"], cond: ["viendrais", "viendrais", "viendrait", "viendrions", "viendriez", "viendraient"] } },
            { tr: "Yaşamak", inf: "vivre", conjugations: { pres: ["vis", "vis", "vit", "vivons", "vivez", "vivent"], pc: ["ai vécu", "as vécu", "a vécu", "avons vécu", "avez vécu", "ont vécu"], imp: ["vivais", "vivais", "vivait", "vivions", "viviez", "vivaient"], fut: ["vivrai", "vivras", "vivra", "vivrons", "vivrez", "vivront"], subj: ["vive", "vives", "vive", "vivions", "viviez", "vivent"], cond: ["vivrais", "vivrais", "vivrait", "vivrions", "vivriez", "vivraient"] } },
            { tr: "Görmek", inf: "voir", conjugations: { pres: ["vois", "vois", "voit", "voyons", "voyez", "voient"], pc: ["ai vu", "as vu", "a vu", "avons vu", "avez vu", "ont vu"], imp: ["voyais", "voyais", "voyait", "voyions", "voyiez", "voyaient"], fut: ["verrai", "verras", "verra", "verrons", "verrez", "verront"], subj: ["voie", "voies", "voie", "voyions", "voyiez", "voient"], cond: ["verrais", "verrais", "verrait", "verrions", "verriez", "verraient"] } },
            { tr: "İstemek", inf: "vouloir", conjugations: { pres: ["veux", "veux", "veut", "voulons", "voulez", "veulent"], pc: ["ai voulu", "as voulu", "a voulu", "avons voulu", "avez voulu", "ont voulu"], imp: ["voulais", "voulais", "voulait", "voulions", "vouliez", "voulaient"], fut: ["voudrai", "voudras", "voudra", "voudrons", "voudrez", "voudront"], subj: ["veuille", "veuilles", "veuille", "voulions", "vouliez", "veuillent"], cond: ["voudrais", "voudrais", "voudrait", "voudrions", "voudriez", "voudraient"] } }
        ];

        // Sıralama (Sort) İşlemi: Alfabetik
        const VERBS_DATA = RAW_VERBS_DATA.sort((a, b) => a.inf.localeCompare(b.inf));

        const TENSES = [
            { id: 'pres', label: 'Présent', desc: "Şimdiki zaman." },
            { id: 'pc', label: 'Passé Composé', desc: "Geçmiş zaman." },
            { id: 'imp', label: 'Imparfait', desc: "Geçmişte süreklilik." },
            { id: 'fut', label: 'Futur Simple', desc: "Gelecek zaman." },
            { id: 'subj', label: 'Subjonctif', desc: "İstek/Dilek kipi." },
            { id: 'cond', label: 'Conditionnel', desc: "Koşul kipi." }
        ];

        const PERSONS = [
            { label: 'Je', index: 0 }, { label: 'Tu', index: 1 }, { label: 'Il / Elle', index: 2 },
            { label: 'Nous', index: 3 }, { label: 'Vous', index: 4 }, { label: 'Ils / Elles', index: 5 }
        ];

        const ACCENTS = ['é', 'è', 'ê', 'ë', 'à', 'â', 'î', 'ï', 'ô', 'û', 'ù', 'ç'];

        function App() {
            const [view, setView] = useState('index');
            const [currentVerbIdx, setCurrentVerbIdx] = useState(0);
            const [currentTenseIdx, setCurrentTenseIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [checked, setChecked] = useState({}); 
            const [showAllCorrect, setShowAllCorrect] = useState(false);
            const [copyFeedback, setCopyFeedback] = useState(null);

            const currentVerb = VERBS_DATA[currentVerbIdx];
            const currentTense = TENSES[currentTenseIdx];
            const pageKey = `${currentVerbIdx}-${currentTenseIdx}`;
            const isPageChecked = checked[pageKey];

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                document.body.appendChild(textArea); textArea.focus(); textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyFeedback(text);
                    setTimeout(() => setCopyFeedback(null), 1500);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleInputChange = (personIdx, value) => {
                setAnswers(prev => ({ ...prev, [`${pageKey}-${personIdx}`]: value.toLowerCase() }));
            };

            const handleCheck = () => setChecked(prev => ({ ...prev, [pageKey]: true }));
            const handleReveal = () => { setShowAllCorrect(true); handleCheck(); };

            const handleNext = () => {
                setShowAllCorrect(false);
                if (currentTenseIdx < TENSES.length - 1) setCurrentTenseIdx(prev => prev + 1);
                else if (currentVerbIdx < VERBS_DATA.length - 1) {
                    setCurrentVerbIdx(prev => prev + 1);
                    setCurrentTenseIdx(0);
                } else setView('index');
            };

            const isTenseCompleted = (vIdx, tIdx) => checked[`${vIdx}-${tIdx}`];

            if (view === 'index') {
                return (
                    <div className="min-h-screen bg-[#f8fafc] p-6 md:p-12 text-slate-800 animate-fade-in">
                        <div className="max-w-6xl mx-auto">
                            <header className="mb-12 text-center">
                                <h1 className="text-4xl font-black text-indigo-900 mb-4 tracking-tight">Fransızca Fiil Matrisi</h1>
                                <p className="text-slate-500 text-lg font-medium">50 Temel Fiil - Alfabetik Olarak Sıralandı</p>
                            </header>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {VERBS_DATA.map((verb, vIdx) => (
                                    <div key={vIdx} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="text-md font-black text-indigo-700">{verb.inf.toUpperCase()}</h3>
                                            <span className="text-[10px] text-slate-400 font-bold uppercase">{verb.tr}</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-1">
                                            {TENSES.map((tense, tIdx) => (
                                                <button key={tIdx} onClick={() => { setCurrentVerbIdx(vIdx); setCurrentTenseIdx(tIdx); setView('quiz'); }}
                                                    className={`text-[8px] p-1.5 rounded-lg font-black uppercase tracking-tighter transition-all flex items-center justify-center ${isTenseCompleted(vIdx, tIdx) ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-slate-50 text-slate-500 hover:bg-indigo-50'}`}>
                                                    {tense.id} {isTenseCompleted(vIdx, tIdx) && <IconCheck size={8} strokeWidth={4} className="ml-1" />}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f8fafc] p-4 md:p-8 animate-fade-in">
                    <div className="max-w-4xl mx-auto">
                        <div className="mb-6 flex flex-wrap items-center justify-center gap-2 bg-white p-3 rounded-2xl shadow-sm border border-slate-100 relative">
                            {ACCENTS.map(char => (
                                <button key={char} onClick={() => copyToClipboard(char)} className="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg font-bold text-lg transition-all border border-transparent hover:border-indigo-100">
                                    {char}
                                </button>
                            ))}
                            {copyFeedback && <div className="absolute -top-10 left-1/2 -translate-x-1/2 px-3 py-1 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow-lg">"{copyFeedback}" Kopyalandı!</div>}
                        </div>

                        <div className="mb-6 flex items-center justify-between">
                            <button onClick={() => setView('index')} className="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm border border-slate-100 text-slate-600 font-bold hover:bg-slate-50 transition-all">
                                <IconHome /> <span className="hidden sm:inline">Menü</span>
                            </button>
                            <div className="text-xs font-black text-slate-400 bg-white px-3 py-1 rounded-full border border-slate-100">
                                {currentVerbIdx + 1} / {VERBS_DATA.length} FIIL
                            </div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
                            <div className="p-8 bg-indigo-600 text-white text-center">
                                <h1 className="text-4xl font-black mb-1">{currentVerb.inf.toUpperCase()}</h1>
                                <p className="text-indigo-100 text-lg opacity-80 font-medium">{currentVerb.tr}</p>
                                <div className="mt-6 inline-block bg-white/10 px-6 py-2 rounded-full backdrop-blur-md border border-white/10 font-black text-sm uppercase tracking-widest">{currentTense.label}</div>
                            </div>

                            <div className="p-8 md:p-12">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                                    {PERSONS.map((person) => {
                                        const key = `${pageKey}-${person.index}`;
                                        const userValRaw = answers[key] || "";
                                        const correctVal = currentVerb.conjugations[currentTense.id][person.index].toLowerCase();
                                        const isCorrect = userValRaw.trim() === correctVal;
                                        const isDisabled = correctVal === "-";
                                        
                                        return (
                                            <div key={person.index} className={`flex flex-col gap-2 ${isDisabled ? 'opacity-20' : ''}`}>
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">{person.label}</label>
                                                <div className="relative">
                                                    <input type="text" 
                                                        value={showAllCorrect ? (isDisabled ? "-" : correctVal) : userValRaw} 
                                                        onChange={(e) => handleInputChange(person.index, e.target.value)} 
                                                        disabled={isPageChecked || isDisabled} 
                                                        placeholder={isDisabled ? "N/A" : "..."}
                                                        className={`w-full p-4 rounded-2xl border-2 outline-none transition-all text-xl font-bold 
                                                            ${!isPageChecked ? 'border-slate-100 bg-slate-50/50 focus:border-indigo-500 focus:bg-white' : 
                                                              (isCorrect || showAllCorrect) ? 'border-emerald-200 bg-emerald-50 text-emerald-800' : 'border-rose-100 bg-rose-50 text-rose-800'}`} />
                                                    {isPageChecked && !isDisabled && (
                                                        <div className="absolute right-4 top-1/2 -translate-y-1/2">
                                                            {(isCorrect || showAllCorrect) ? <IconCheck size={24} strokeWidth={4} className="text-emerald-500" /> : <IconX size={24} strokeWidth={4} className="text-rose-400" />}
                                                        </div>
                                                    )}
                                                </div>
                                                {isPageChecked && !isCorrect && !showAllCorrect && !isDisabled && (
                                                    <div className="mt-1 px-4 py-2 bg-indigo-50 rounded-xl text-xs font-black text-indigo-600">
                                                        Doğrusu: {correctVal}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="mt-12 flex flex-col md:flex-row items-center justify-between gap-6">
                                    <button onClick={() => { if (currentTenseIdx > 0) setCurrentTenseIdx(prev => prev - 1); else if (currentVerbIdx > 0) { setCurrentVerbIdx(v => v-1); setCurrentTenseIdx(TENSES.length-1); } }}
                                        disabled={currentVerbIdx === 0 && currentTenseIdx === 0} className="text-slate-400 hover:text-indigo-600 font-black transition-colors disabled:opacity-0 flex items-center gap-2">
                                        <IconChevronLeft /> Önceki
                                    </button>

                                    {!isPageChecked ? (
                                        <div className="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                                            <button onClick={handleCheck} className="flex-1 px-12 py-5 bg-indigo-600 text-white rounded-2xl font-black text-xl shadow-2xl hover:bg-indigo-700 transition-all">Kontrol Et</button>
                                            <button onClick={handleReveal} className="flex items-center justify-center gap-2 px-6 py-5 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all"><IconEye /> Cevaplar</button>
                                        </div>
                                    ) : (
                                        <button onClick={handleNext} className="w-full md:w-auto px-16 py-5 bg-emerald-600 text-white rounded-2xl font-black text-xl shadow-2xl hover:bg-emerald-700 transition-all flex items-center justify-center gap-3">
                                            Sıradaki <IconArrowRight />
                                        </button>
                                    )}
                                    <div className="hidden md:block w-[100px]"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
