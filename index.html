    { rank: 131, tr: "Adorer", inf: "adorer", conjugations: { pres: ["adore", "adores", "adore", "adorons", "adorez", "adorent"], pc: ["ai adoré", "as adoré", "a adoré", "avons adoré", "avez adoré", "ont adoré"], imp: ["adorais", "adorais", "adorait", "adorions", "adoriez", "adoraient"], fut: ["adorerai", "adoreras", "adorera", "adorerons", "adorerez", "adoreront"], subj: ["adore", "adores", "adore", "adorions", "adoriez", "adorent"], cond: ["adorerais", "adorerais", "adorerait", "adorerions", "adoreriez", "adoreraient"] } },
    { rank: 132, tr: "Accepter", inf: "accepter", conjugations: { pres: ["accepte", "acceptes", "accepte", "acceptons", "acceptez", "acceptent"], pc: ["ai accepté", "as accepté", "a accepté", "avons accepté", "avez accepté", "ont accepté"], imp: ["acceptais", "acceptais", "acceptait", "acceptions", "acceptiez", "acceptaient"], fut: ["accepterai", "accepteras", "acceptera", "accepterons", "accepterez", "accepteront"], subj: ["accepte", "acceptes", "accepte", "acceptions", "acceptiez", "acceptent"], cond: ["accepterais", "accepterais", "accepterait", "accepterions", "accepteriez", "accepteraient"] } }
        ];

        const TENSES = [
            { id: 'pres', label: 'Présent', desc: "Moment actuel" },
            { id: 'pc', label: 'Passé Composé', desc: "Action terminée" },
            { id: 'imp', label: 'Imparfait', desc: "Habitude / Description" },
            { id: 'ps', label: 'Passé Simple', desc: "Action ponctuelle (écrit)" },
            { id: 'fut', label: 'Futur Simple', desc: "Action à venir" },
            { id: 'subj', label: 'Subjonctif', desc: "Souhait / Doute" },
            { id: 'cond', label: 'Conditionnel', desc: "Hypothèse / Souhait" }
        ];

        const PERSONS = [
            { label: 'Je', index: 0 }, { label: 'Tu', index: 1 }, { label: 'Il / Elle', index: 2 },
            { label: 'Nous', index: 3 }, { label: 'Vous', index: 4 }, { label: 'Ils / Elles', index: 5 }
        ];

        const ACCENTS = ['é', 'è', 'ê', 'ë', 'à', 'â', 'î', 'ï', 'ô', 'û', 'ù', 'ç'];

        function App() {
            const [view, setView] = useState('index'); 
            const [currentVerbIdx, setCurrentVerbIdx] = useState(0);
            const [currentTenseIdx, setCurrentTenseIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [checked, setChecked] = useState({}); 
            const [showAllCorrect, setShowAllCorrect] = useState(false);
            const [copyFeedback, setCopyFeedback] = useState(null);
            const [sortBy, setSortBy] = useState('alphabet'); // alphabet | importance

            const [gameState, setGameState] = useState({ 
                score: 0, 
                lives: 3, 
                high: 0, 
                active: false, 
                setup: true,
                selectedTenses: TENSES.map(t => t.id),
                filterLimit: Infinity,
                mistakes: []
            });
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [gameInput, setGameInput] = useState('');
            const [gameFeedback, setGameFeedback] = useState(null);

            const gameInputRef = useRef(null);

            // Verbs list with sorting
            const sortedVerbs = useMemo(() => {
                let list = [...VERBS_DATA];
                if (sortBy === 'alphabet') {
                    return list.sort((a, b) => a.inf.localeCompare(b.inf));
                } else {
                    return list.sort((a, b) => a.rank - b.rank);
                }
            }, [sortBy]);

            const gameVerbsPool = useMemo(() => {
                return VERBS_DATA.filter(v => v.rank <= gameState.filterLimit);
            }, [gameState.filterLimit]);

            useEffect(() => {
                const savedHigh = localStorage.getItem('french_verbs_high_score_v2');
                if (savedHigh) setGameState(prev => ({ ...prev, high: parseInt(savedHigh) }));
            }, []);

            useEffect(() => {
                if (gameState.high > 0) localStorage.setItem('french_verbs_high_score_v2', gameState.high);
            }, [gameState.high]);

            const generateQuestion = useCallback(() => {
                const pool = gameState.selectedTenses.length > 0 ? gameState.selectedTenses : ['pres'];
                let vIdx, tId, pIdx, tIdx;
                
                let attempts = 0;
                do {
                    vIdx = Math.floor(Math.random() * gameVerbsPool.length);
                    tId = pool[Math.floor(Math.random() * pool.length)];
                    tIdx = TENSES.findIndex(t => t.id === tId);
                    pIdx = Math.floor(Math.random() * PERSONS.length);
                    attempts++;
                } while (gameVerbsPool[vIdx].conjugations[tId][pIdx] === '-' && attempts < 100);

                setCurrentQuestion({ vIdx, tIdx, pIdx });
                setGameInput('');
                setGameFeedback(null);
            }, [gameState.selectedTenses, gameVerbsPool]);

            const startNewGame = () => {
                setGameState(prev => ({ ...prev, score: 0, lives: 3, active: true, setup: false, mistakes: [] }));
                setTimeout(() => generateQuestion(), 50);
                setView('game');
            };

            const toggleTense = (id) => {
                setGameState(prev => ({
                    ...prev,
                    selectedTenses: prev.selectedTenses.includes(id) 
                        ? prev.selectedTenses.filter(t => t !== id) 
                        : [...prev.selectedTenses, id]
                }));
            };

            const setGamePool = (limit) => {
                setGameState(prev => ({ ...prev, filterLimit: limit }));
            };

            const handleGameSubmit = (e) => {
                if (e) e.preventDefault();
                if (!currentQuestion || gameFeedback) return;

                const correct = gameVerbsPool[currentQuestion.vIdx].conjugations[TENSES[currentQuestion.tIdx].id][currentQuestion.pIdx].toLowerCase();
                const user = gameInput.trim().toLowerCase();

                if (user === correct) {
                    setGameFeedback('correct');
                    setGameState(prev => {
                        const newScore = prev.score + 1;
                        return { ...prev, score: newScore, high: Math.max(prev.high, newScore) };
                    });
                    setTimeout(() => generateQuestion(), 800);
                } else {
                    setGameFeedback('wrong');
                    const newMistake = {
                        verb: gameVerbsPool[currentQuestion.vIdx].inf,
                        tense: TENSES[currentQuestion.tIdx].label,
                        person: PERSONS[currentQuestion.pIdx].label,
                        user: user || "(vide)",
                        correct: correct
                    };
                    setGameState(prev => ({ 
                        ...prev, 
                        lives: prev.lives - 1,
                        mistakes: [newMistake, ...prev.mistakes]
                    }));
                    
                    if (gameState.lives <= 1) {
                        setTimeout(() => setGameState(prev => ({ ...prev, active: false })), 1500);
                    } else {
                        setTimeout(() => generateQuestion(), 1500);
                    }
                }
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyFeedback(text);
                } catch (err) {}
                document.body.removeChild(textArea);
                setTimeout(() => setCopyFeedback(null), 1500);
            };

            const resetAnswersVisibility = () => {
                setShowAllCorrect(false);
            };

            const goToMenu = () => { 
                setView('index'); 
                resetAnswersVisibility(); 
            };

            if (view === 'index') {
                return (
                    <div className="min-h-screen p-6 md:p-12 text-slate-800 animate-fade-in">
                        <div className="max-w-6xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
                                <div className="text-center md:text-left">
                                    <h1 className="text-4xl font-black text-indigo-900 mb-1 tracking-tight uppercase">Atlas des Verbes</h1>
                                    <p className="text-slate-500 font-medium italic">Logiciel de Conjugaison Française</p>
                                </div>
                                <div className="flex flex-wrap justify-center gap-4">
                                    {/* Sort Menu */}
                                    <div className="flex bg-white rounded-2xl border border-slate-200 shadow-sm p-1">
                                        <button 
                                            onClick={() => setSortBy('alphabet')}
                                            className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all flex items-center gap-2 ${sortBy === 'alphabet' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-indigo-600'}`}
                                        >
                                            <IconSort /> A-Z
                                        </button>
                                        <button 
                                            onClick={() => setSortBy('importance')}
                                            className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all flex items-center gap-2 ${sortBy === 'importance' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-indigo-600'}`}
                                        >
                                            <IconSort /> Importance
                                        </button>
                                    </div>
                                    <div className="bg-white px-4 py-2 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                                        <IconTrophy />
                                        <div>
                                            <p className="text-[8px] font-black text-slate-400 uppercase">Record</p>
                                            <p className="text-sm font-black">{gameState.high}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => { setGameState(s => ({...s, setup: true, active: false})); setView('game'); }} className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-3 shadow-lg hover:bg-indigo-700 transition-all uppercase text-xs">
                                        <IconGamepad /> Mode Jeu
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                {sortedVerbs.map((verb, idx) => (
                                    <button key={idx} onClick={() => { 
                                        const globalIdx = VERBS_DATA.findIndex(v => v.inf === verb.inf);
                                        setCurrentVerbIdx(globalIdx); 
                                        setView('verb-detail'); 
                                    }} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:border-indigo-300 transition-all text-left group relative overflow-hidden flex flex-col justify-center min-h-[100px]">
                                        <div className="absolute top-0 right-0 bg-slate-50 text-slate-300 text-[8px] font-black px-2 py-1 rounded-bl-lg">#{verb.rank}</div>
                                        <p className="text-lg font-black text-slate-800 group-hover:text-indigo-700 leading-tight truncate">{verb.inf.toUpperCase()}</p>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'game') {
                return (
                    <div className="min-h-screen bg-slate-900 p-4 flex flex-col items-center justify-center text-white animate-fade-in">
                        <div className="max-w-md w-full">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={goToMenu} className="text-slate-400 hover:text-white flex items-center gap-2 text-sm uppercase font-bold">
                                    <IconChevronLeft /> Menu
                                </button>
                                <div className="flex gap-2">
                                    {[1, 2, 3].map(i => <IconHeart key={i} filled={i <= gameState.lives} />)}
                                </div>
                            </div>

                            {gameState.setup ? (
                                <div className="bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 animate-pop overflow-y-auto max-h-[85vh] hide-scrollbar">
                                    <h2 className="text-2xl font-black mb-6 uppercase text-center tracking-tight">Configuration du jeu</h2>
                                    
                                    <div className="mb-8">
                                        <p className="text-slate-400 text-[10px] mb-4 text-center font-black tracking-widest uppercase">1. Pool de verbes (Importance)</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            {[
                                                { label: 'Top 10', limit: 10 },
                                                { label: 'Top 25', limit: 25 },
                                                { label: 'Top 50', limit: 50 },
                                                { label: 'Top 75', limit: 75 },
                                                { label: 'Top 100', limit: 100 },
                                                { label: 'Tous', limit: Infinity }
                                            ].map(pool => (
                                                <button 
                                                    key={pool.label}
                                                    onClick={() => setGamePool(pool.limit)}
                                                    className={`p-3 rounded-xl border-2 transition-all font-black text-[10px] uppercase ${gameState.filterLimit === pool.limit ? 'border-indigo-500 bg-indigo-500/10 text-white' : 'border-slate-700 bg-slate-900/40 text-slate-500'}`}
                                                >
                                                    {pool.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="mb-10">
                                        <p className="text-slate-400 text-[10px] mb-4 text-center font-black tracking-widest uppercase">2. Temps (Tenses)</p>
                                        <div className="space-y-2">
                                            {TENSES.map(t => (
                                                <button key={t.id} onClick={() => toggleTense(t.id)} className={`w-full flex justify-between items-center p-3 rounded-xl border-2 transition-all font-bold text-xs uppercase ${gameState.selectedTenses.includes(t.id) ? 'border-indigo-500 bg-indigo-500/10 text-white' : 'border-slate-700 bg-slate-900/40 text-slate-500'}`}>
                                                    {t.label} {gameState.selectedTenses.includes(t.id) && <IconCheck size={14} />}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button disabled={gameState.selectedTenses.length === 0} onClick={startNewGame} className="w-full bg-indigo-600 py-4 rounded-2xl font-black text-lg hover:bg-indigo-700 disabled:opacity-50 transition-all uppercase shadow-xl">
                                        Démarrer le jeu
                                    </button>
                                </div>
                            ) : gameState.active ? (
                                <div className="bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 animate-pop">
                                    <div className="text-center mb-6">
                                        <div className="text-indigo-400 font-black uppercase tracking-widest text-[10px] mb-2">Conjuguez le verbe</div>
                                        <h2 className="text-4xl font-black mb-4">{currentQuestion && gameVerbsPool[currentQuestion.vIdx].inf.toUpperCase()}</h2>
                                        <div className="flex justify-center gap-2">
                                            {currentQuestion && (
                                                <>
                                                    <span className="bg-slate-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">{TENSES[currentQuestion.tIdx].label}</span>
                                                    <span className="bg-indigo-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">{PERSONS[currentQuestion.pIdx].label}</span>
                                                </>
                                            )}
                                        </div>
                                    </div>

                                    <form onSubmit={handleGameSubmit} className="space-y-4">
                                        <input ref={gameInputRef} type="text" value={gameInput} onChange={(e) => setGameInput(e.target.value)} disabled={!!gameFeedback} placeholder="..." className={`w-full bg-slate-900 border-2 rounded-2xl p-4 text-center text-2xl font-black transition-all outline-none ${!gameFeedback ? 'border-slate-600 focus:border-indigo-500' : gameFeedback === 'correct' ? 'border-emerald-500 text-emerald-400' : 'border-rose-500 text-rose-400'}`} />
                                        
                                        <div className="flex items-center justify-between gap-4 py-2">
                                            <div className="text-left flex-1">
                                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Score</p>
                                                <p className="text-2xl font-black text-indigo-500 leading-none">{gameState.score}</p>
                                            </div>
                                            {!gameFeedback && (
                                                <button type="submit" className="bg-indigo-600 px-8 py-3 rounded-xl font-black uppercase text-sm hover:bg-indigo-500 transition-colors shadow-lg">Valider</button>
                                            )}
                                            <div className="text-right flex-1">
                                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Record</p>
                                                <p className="text-2xl font-black text-slate-400 leading-none">{gameState.high}</p>
                                            </div>
                                        </div>
                                        
                                        {gameFeedback === 'wrong' && currentQuestion && (
                                            <p className="text-center text-rose-400 text-sm font-bold animate-fade-in pt-2">Correct : {gameVerbsPool[currentQuestion.vIdx].conjugations[TENSES[currentQuestion.tIdx].id][currentQuestion.pIdx]}</p>
                                        )}
                                    </form>
                                </div>
                            ) : (
                                <div className="bg-slate-800 rounded-3xl p-8 text-center shadow-2xl border border-slate-700 animate-pop max-h-[80vh] flex flex-col">
                                    <div className="flex justify-center mb-4 text-indigo-500"><IconTrophy /></div>
                                    <h2 className="text-2xl font-black mb-6 uppercase">Partie terminée</h2>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-slate-900 p-3 rounded-2xl">
                                            <p className="text-[10px] font-black text-slate-500 uppercase">Score</p>
                                            <p className="text-2xl font-black text-emerald-400">{gameState.score}</p>
                                        </div>
                                        <div className="bg-slate-900 p-3 rounded-2xl">
                                            <p className="text-[10px] font-black text-slate-500 uppercase">Record</p>
                                            <p className="text-2xl font-black text-indigo-400">{gameState.high}</p>
                                        </div>
                                    </div>

                                    {gameState.mistakes.length > 0 && (
                                        <div className="flex-grow overflow-y-auto mb-6 pr-2 hide-scrollbar text-left border-t border-slate-700 pt-4">
                                            <p className="text-[10px] font-black text-slate-500 uppercase mb-3 tracking-widest">Résumé des erreurs :</p>
                                            {gameState.mistakes.map((m, i) => (
                                                <div key={i} className="mb-2 p-3 bg-slate-900/50 rounded-xl border border-slate-700">
                                                    <div className="flex justify-between items-start mb-1">
                                                        <span className="text-indigo-400 font-black text-xs uppercase">{m.verb} ({m.tense})</span>
                                                    </div>
                                                    <p className="text-[11px] text-slate-400 font-medium">
                                                        {m.person}: <span className="text-rose-400 line-through mr-2">{m.user}</span>
                                                        <span className="text-emerald-400 font-bold">{m.correct}</span>
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <button onClick={() => setGameState(s => ({...s, setup: true}))} className="w-full bg-indigo-600 py-4 rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all uppercase flex items-center justify-center gap-2">
                                        <IconRefresh /> Rejouer
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (view === 'verb-detail') {
                const currentVerb = VERBS_DATA[currentVerbIdx];
                return (
                    <div className="min-h-screen p-6 md:p-12 text-slate-800 animate-fade-in">
                        <div className="max-w-3xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <button onClick={goToMenu} className="text-indigo-600 font-black uppercase text-xs flex items-center gap-2"><IconChevronLeft /> Retour</button>
                                <button onClick={() => { setGameState(s => ({...s, setup: true})); setView('game'); }} className="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-black text-[10px] border border-indigo-100 uppercase"><IconGamepad /> Mode Jeu</button>
                            </div>
                            <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden relative">
                                <div className="absolute top-10 right-10 bg-white/20 px-3 py-1 rounded-lg text-white font-black text-sm">Rang: #{currentVerb.rank}</div>
                                <div className="p-10 bg-indigo-600 text-white text-center">
                                    <h1 className="text-5xl font-black mb-2 uppercase">{currentVerb.inf}</h1>
                                    <p className="text-indigo-200 text-xs font-black tracking-[0.2em] uppercase">Choisir un temps</p>
                                </div>
                                <div className="p-8 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {TENSES.map((tense, tIdx) => (
                                        <button key={tIdx} onClick={() => { setCurrentTenseIdx(tIdx); setView('quiz'); }} className="p-6 rounded-3xl border-2 border-slate-50 bg-slate-50 hover:border-indigo-400 hover:bg-white transition-all text-left">
                                            <p className="font-black text-lg uppercase mb-1">{tense.label}</p>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase">{tense.desc}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const currentVerb = VERBS_DATA[currentVerbIdx];
                const currentTense = TENSES[currentTenseIdx];
                const quizPageKey = `${currentVerbIdx}-${currentTenseIdx}`;
                const isPageChecked = checked[quizPageKey];

                return (
                    <div className="min-h-screen p-4 md:p-8 text-slate-800 animate-fade-in">
                        <div className="max-w-4xl mx-auto">
                            <div className="mb-6 flex flex-wrap items-center justify-center gap-2 bg-white p-3 rounded-2xl shadow-sm border border-slate-100 relative">
                                {ACCENTS.map(char => (
                                    <button key={char} onClick={() => copyToClipboard(char)} className="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg font-bold text-lg border border-transparent transition-all">{char}</button>
                                ))}
                                {copyFeedback && <div className="absolute -top-10 left-1/2 -translate-x-1/2 px-3 py-1 bg-indigo-600 text-white text-xs font-bold rounded-lg animate-bounce">"{copyFeedback}" Copié !</div>}
                            </div>

                            <div className="mb-6 flex items-center justify-between">
                                <button onClick={() => setView('verb-detail')} className="px-4 py-2 bg-white rounded-xl shadow-sm border border-slate-100 text-[10px] font-black uppercase"><IconChevronLeft /></button>
                                <div className="flex-1 max-w-[200px] mx-4 bg-slate-200 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-indigo-600 h-full transition-all" style={{ width: `${((currentVerbIdx + 1) / VERBS_DATA.length) * 100}%` }} />
                                </div>
                                <button onClick={goToMenu} className="px-4 py-2 bg-white rounded-xl shadow-sm border border-slate-100 text-[10px] font-black uppercase"><IconHome /></button>
                            </div>

                            <div className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
                                <div className="p-8 bg-indigo-600 text-white text-center">
                                    <h1 className="text-4xl font-black mb-1 uppercase tracking-tight">{currentVerb.inf}</h1>
                                    <div className="mt-4 inline-block bg-white/10 px-6 py-2 rounded-full border border-white/10 font-black text-[10px] uppercase tracking-widest">{currentTense.label}</div>
                                </div>

                                <div className="p-8 md:p-12">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                                        {PERSONS.map((person) => {
                                            const key = `${quizPageKey}-${person.index}`;
                                            const userValRaw = answers[key] || "";
                                            const correctVal = currentVerb.conjugations[currentTense.id][person.index].toLowerCase();
                                            const isCorrect = userValRaw.trim().toLowerCase() === correctVal;
                                            const finalValue = showAllCorrect ? correctVal : userValRaw;
                                            
                                            return (
                                                <div key={person.index} className="flex flex-col gap-2">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">{person.label}</label>
                                                    <div className="relative">
                                                        <input type="text" value={finalValue} onChange={(e) => setAnswers(p => ({...p, [key]: e.target.value}))} disabled={isPageChecked} className={`w-full p-4 rounded-2xl border-2 outline-none transition-all text-xl font-black ${!isPageChecked ? 'border-slate-100 bg-slate-50 focus:border-indigo-500 focus:bg-white' : (isCorrect || showAllCorrect) ? 'border-emerald-100 bg-emerald-50 text-emerald-800' : 'border-rose-100 bg-rose-50 text-rose-800'}`} />
                                                        {isPageChecked && <div className="absolute right-4 top-1/2 -translate-y-1/2">{(isCorrect || showAllCorrect) ? <IconCheck size={20} className="text-emerald-500" /> : <IconX size={20} className="text-rose-400" />}</div>}
                                                    </div>
                                                    {isPageChecked && !isCorrect && !showAllCorrect && (
                                                        <p className="mt-1 text-[11px] font-black text-indigo-600 uppercase tracking-tighter">Correct : {correctVal}</p>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <div className="mt-12 flex flex-col md:flex-row items-center justify-between gap-6">
                                        <button onClick={() => setView('verb-detail')} className="text-slate-400 hover:text-indigo-600 font-black uppercase text-xs">Retour aux temps</button>

                                        {!isPageChecked ? (
                                            <div className="flex gap-4 w-full md:w-auto">
                                                <button onClick={() => setChecked(p => ({...p, [quizPageKey]: true}))} className="flex-1 px-12 py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg uppercase shadow-xl hover:bg-indigo-700 transition-all">Vérifier</button>
                                                <button onClick={() => { setShowAllCorrect(true); setChecked(p => ({...p, [quizPageKey]: true})); }} className="px-6 py-5 bg-slate-100 text-slate-600 rounded-2xl font-black text-xs uppercase hover:bg-slate-200 transition-all"><IconEye /></button>
                                            </div>
                                        ) : (
                                            <button onClick={() => { resetAnswersVisibility(); if(currentTenseIdx < TENSES.length-1) setCurrentTenseIdx(t => t+1); else setView('verb-detail'); }} className="w-full md:w-auto px-16 py-5 bg-emerald-600 text-white rounded-2xl font-black text-lg uppercase shadow-xl hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">Suivant <IconArrowRight /></button>
                                        )}
                                        <div className="hidden md:block w-20"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
