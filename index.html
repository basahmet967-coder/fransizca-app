        ];

        function App() {
            const [view, setView] = useState('index');
            const [gameScore, setGameScore] = useState(0);
            const [bestScore, setBestScore] = useState(0);
            const [gameLives, setGameLives] = useState(3);
            const [gameChallenge, setGameChallenge] = useState(null);
            const [gameInput, setGameInput] = useState('');
            const [gameFeedback, setGameFeedback] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('maxScore');
                if (saved) setBestScore(parseInt(saved));
            }, []);

            const getRandomChallenge = () => {
                let v, t, p, answer;
                let attempts = 0;
                do {
                    v = Math.floor(Math.random() * VERBS_DATA.length);
                    t = Math.floor(Math.random() * TENSES.length);
                    p = Math.floor(Math.random() * PERSONS.length);
                    answer = VERBS_DATA[v].conj[TENSES[t].id][p];
                    attempts++;
                } while ((answer === "-" || !answer) && attempts < 100);
                return { verbIdx: v, tenseIdx: t, personIdx: p, answer: answer };
            };

            const startGame = () => {
                setGameScore(0);
                setGameLives(3);
                setGameChallenge(getRandomChallenge());
                setGameInput('');
                setGameFeedback(null);
                setView('game');
            };

            const submitAnswer = () => {
                if (!gameChallenge || gameFeedback) return;
                const isCorrect = gameInput.trim().toLowerCase() === gameChallenge.answer.toLowerCase();
                if (isCorrect) {
                    setGameFeedback('correct');
                    const nextScore = gameScore + 1;
                    setGameScore(nextScore);
                    if (nextScore > bestScore) {
                        setBestScore(nextScore);
                        localStorage.setItem('maxScore', nextScore.toString());
                    }
                    setTimeout(() => {
                        setGameChallenge(getRandomChallenge());
                        setGameInput('');
                        setGameFeedback(null);
                    }, 600);
                } else {
                    setGameFeedback('wrong');
                    setGameLives(l => l - 1);
                }
            };

            if (view === 'index') {
                return (
                    <div className="min-h-screen p-6 animate-fade-in flex flex-col items-center">
                        <header className="mb-12 text-center w-full max-w-xl">
                            <h1 className="text-4xl font-black text-indigo-900 mb-2">LA MATRICE</h1>
                            <div className="bg-indigo-50 py-2 px-6 rounded-full inline-flex items-center gap-2 mb-8">
                                <IconTrophy className="text-indigo-600" />
                                <span className="font-black text-indigo-900">RECORD: {bestScore}</span>
                            </div>
                            <button onClick={startGame} className="w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl shadow-xl hover:scale-[1.02] transition-all">
                                JOUER MAINTENANT
                            </button>
                        </header>
                        
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 w-full max-w-6xl">
                            {VERBS_DATA.map((verb, i) => (
                                <div key={i} className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm text-center">
                                    <div className="text-xs font-black text-indigo-600 uppercase">{verb.inf}</div>
                                    <div className="text-[10px] text-slate-400 italic truncate">{verb.tr}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'game') {
                const isGameOver = gameLives <= 0;
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center animate-fade-in">
                        <div className="w-full max-w-md flex justify-between items-center mb-8 bg-white p-4 rounded-3xl shadow-sm border border-slate-50">
                            <button onClick={() => setView('index')} className="p-2 text-slate-300"><IconHome /></button>
                            <div className="flex gap-1">
                                {[...Array(3)].map((_, i) => <IconHeart key={i} filled={i < gameLives} />)}
                            </div>
                            <div className="font-black text-indigo-600">{gameScore} <span className="text-[10px] text-slate-400 uppercase">Pts</span></div>
                        </div>

                        <div className="w-full max-w-md bg-white rounded-[3.5rem] shadow-2xl p-8 text-center border border-slate-50">
                            {isGameOver ? (
                                <div className="py-10">
                                    <h2 className="text-4xl font-black text-slate-900 mb-2">FINI !</h2>
                                    <p className="text-slate-400 font-bold text-xl mb-10">Score: {gameScore}</p>
                                    <button onClick={startGame} className="w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-xl shadow-lg">REJOUER</button>
                                </div>
                            ) : (
                                <>
                                    <div className="bg-[#f8faff] rounded-[2.5rem] p-8 mb-6 border-2 border-indigo-50">
                                        <div className="text-xs font-black text-indigo-300 tracking-widest mb-1">{TENSES[gameChallenge.tenseIdx].label}</div>
                                        <h2 className="text-4xl font-black text-indigo-900 mb-1 uppercase">{VERBS_DATA[gameChallenge.verbIdx].inf}</h2>
                                        <div className="text-indigo-600 font-black text-3xl mt-6">{PERSONS[gameChallenge.personIdx].label} ...</div>
                                    </div>

                                    <input 
                                        autoFocus
                                        type="text"
                                        value={gameInput}
                                        onChange={(e) => setGameInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && submitAnswer()}
                                        disabled={gameFeedback === 'wrong'}
                                        className="w-full p-6 text-2xl font-black text-center rounded-[2rem] border-2 border-slate-100 mb-4 outline-none focus:border-indigo-400 transition-all"
                                        placeholder="..."
                                        autoComplete="off"
                                    />

                                    {gameFeedback === 'wrong' ? (
                                        <div className="animate-fade-in">
                                            <div className="p-5 bg-rose-50 text-rose-600 rounded-[2rem] font-black mb-4 text-lg border-2 border-rose-100">
                                                C'était : {gameChallenge.answer}
                                            </div>
                                            <button onClick={() => {setGameChallenge(getRandomChallenge()); setGameInput(''); setGameFeedback(null);}} 
                                                className="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-black text-xl shadow-lg">CONTINUER</button>
                                        </div>
                                    ) : (
                                        <button onClick={submitAnswer} 
                                            className={`w-full py-6 rounded-[2rem] font-black text-2xl shadow-xl transition-all ${gameFeedback === 'correct' ? 'bg-emerald-500 text-white' : 'bg-indigo-600 text-white active:scale-95'}`}>
                                            {gameFeedback === 'correct' ? 'BRAVO !' : 'VÉRIFIER'}
                                        </button>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
