<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fransızca Fiil Çekimi Alıştırması</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React ve ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel CDN (JSX transpile için) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // SVG İkonları
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-0.5-5.12"/><path d="M4 19.5h16"/></svg>;
        const IconCheck = ({ size = 24, strokeWidth = 2, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = ({ size = 24, strokeWidth = 2, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const IconEye = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;

        const VERBS_DATA = [
            {
                tr: "Yapmak", inf: "faire",
                conjugations: {
                    pres: ["fais", "fais", "fait", "faisons", "faites", "font"],
                    pc: ["ai fait", "as fait", "a fait", "avons fait", "avez fait", "ont fait"],
                    imp: ["faisais", "faisais", "faisait", "faisions", "faisiez", "faisaient"],
                    fut: ["ferai", "feras", "fera", "ferons", "ferez", "feront"],
                    subj: ["fasse", "fasses", "fasse", "fassions", "fassiez", "fassent"],
                    cond: ["ferais", "ferais", "ferait", "ferions", "feriez", "feraient"]
                }
            },
            {
                tr: "Olmak", inf: "être",
                conjugations: {
                    pres: ["suis", "es", "est", "sommes", "êtes", "sont"],
                    pc: ["ai été", "as été", "a été", "avons été", "avez été", "ont été"],
                    imp: ["étais", "étais", "était", "étions", "étiez", "étaient"],
                    fut: ["serai", "seras", "sera", "serons", "serez", "seront"],
                    subj: ["sois", "sois", "soit", "soyons", "soyez", "soient"],
                    cond: ["serais", "serais", "serait", "serions", "seriez", "seraient"]
                }
            },
            {
                tr: "Zorunda Olmak / Borçlu Olmak", inf: "devoir",
                conjugations: {
                    pres: ["dois", "dois", "doit", "devons", "devez", "doivent"],
                    pc: ["ai dû", "as dû", "a dû", "avons dû", "avez dû", "ont dû"],
                    imp: ["devais", "devais", "devait", "devions", "deviez", "devaient"],
                    fut: ["devrai", "devras", "devra", "devrons", "devrez", "devront"],
                    subj: ["doive", "doives", "doive", "devions", "deviez", "doivent"],
                    cond: ["devrais", "devrais", "devrait", "devrions", "devriez", "devraient"]
                }
            },
            {
                tr: "Gitmek", inf: "aller",
                conjugations: {
                    pres: ["vais", "vas", "va", "allons", "allez", "vont"],
                    pc: ["suis allé", "es allé", "est allé", "sommes allés", "êtes allés", "sont allés"],
                    imp: ["allais", "allais", "allait", "allions", "alliez", "allaient"],
                    fut: ["irai", "iras", "ira", "irons", "irez", "iront"],
                    subj: ["aille", "ailles", "aille", "allions", "alliez", "aillent"],
                    cond: ["irais", "irais", "irait", "irions", "iriez", "iraient"]
                }
            },
            {
                tr: "Almak", inf: "prendre",
                conjugations: {
                    pres: ["prends", "prends", "prend", "prenons", "prenez", "prennent"],
                    pc: ["ai pris", "as pris", "a pris", "avons pris", "avez pris", "ont pris"],
                    imp: ["prenais", "prenais", "prenait", "prenions", "preniez", "prenaient"],
                    fut: ["prendrai", "prendras", "prendra", "prendrons", "prendrez", "prendront"],
                    subj: ["prenne", "prennes", "prenne", "prenions", "preniez", "prennent"],
                    cond: ["prendrais", "prendrais", "prendrait", "prendrions", "prendriez", "prendraient"]
                }
            },
            {
                tr: "Görmek", inf: "voir",
                conjugations: {
                    pres: ["vois", "vois", "voit", "voyons", "voyez", "voient"],
                    pc: ["ai vu", "as vu", "a vu", "avons vu", "avez vu", "ont vu"],
                    imp: ["voyais", "voyais", "voyait", "voyions", "voyiez", "voyaient"],
                    fut: ["verrai", "verras", "verra", "verrons", "verrez", "verront"],
                    subj: ["voie", "voies", "voie", "voyions", "voyiez", "voient"],
                    cond: ["verrais", "verrais", "verrait", "verrions", "verriez", "verraient"]
                }
            },
            {
                tr: "İstemek", inf: "vouloir",
                conjugations: {
                    pres: ["veux", "veux", "veut", "voulons", "voulez", "veulent"],
                    pc: ["ai voulu", "as voulu", "a voulu", "avons voulu", "avez voulu", "ont voulu"],
                    imp: ["voulais", "voulais", "voulait", "voulions", "vouliez", "voulaient"],
                    fut: ["voudrai", "voudras", "voudra", "voudrons", "voudrez", "voudront"],
                    subj: ["veuille", "veuilles", "veuille", "voulions", "vouliez", "veuillent"],
                    cond: ["voudrais", "voudrais", "voudrait", "voudrions", "voudriez", "voudraient"]
                }
            },
            {
                tr: "Söylemek", inf: "dire",
                conjugations: {
                    pres: ["dis", "dis", "dit", "disons", "dites", "disent"],
                    pc: ["ai dit", "as dit", "a dit", "avons dit", "avez dit", "ont dit"],
                    imp: ["disais", "disais", "disait", "disions", "disiez", "disaient"],
                    fut: ["dirai", "diras", "dira", "dirons", "direz", "diront"],
                    subj: ["dise", "dises", "dise", "disions", "disiez", "disent"],
                    cond: ["dirais", "dirais", "dirait", "dirions", "diriez", "diraient"]
                }
            },
            {
                tr: "Yapabilmek", inf: "pouvoir",
                conjugations: {
                    pres: ["peux", "peux", "peut", "pouvons", "pouvez", "peuvent"],
                    pc: ["ai pu", "as pu", "a pu", "avons pu", "avez pu", "ont pu"],
                    imp: ["pouvais", "pouvais", "pouvait", "pouvions", "pouviez", "pouvaient"],
                    fut: ["pourrai", "pourras", "pourra", "pourrons", "pourrez", "pourront"],
                    subj: ["puisse", "puisses", "puisse", "puissions", "puissiez", "puissent"],
                    cond: ["pourrais", "pourrais", "pourrait", "pourrions", "pourriez", "pourraient"]
                }
            },
            {
                tr: "Bilmek", inf: "savoir",
                conjugations: {
                    pres: ["sais", "sais", "sait", "savons", "savez", "savent"],
                    pc: ["ai su", "as su", "a su", "avons su", "avez su", "ont su"],
                    imp: ["savais", "savais", "savait", "savions", "saviez", "savaient"],
                    fut: ["saurai", "sauras", "saura", "saurons", "saurez", "sauront"],
                    subj: ["sache", "saches", "sache", "sachions", "sachiez", "sachent"],
                    cond: ["saurais", "saurais", "saurait", "saurions", "sauriez", "sauraient"]
                }
            },
            {
                tr: "Gelmek", inf: "venir",
                conjugations: {
                    pres: ["viens", "viens", "vient", "venons", "venez", "viennent"],
                    pc: ["suis venu", "es venu", "est venu", "sommes venus", "êtes venus", "sont venus"],
                    imp: ["venais", "venais", "venait", "venions", "veniez", "venaient"],
                    fut: ["viendrai", "viendras", "viendra", "viendrons", "viendrez", "viendront"],
                    subj: ["vienne", "viennes", "vienne", "venions", "veniez", "viennent"],
                    cond: ["viendrais", "viendrais", "viendrait", "viendrions", "viendriez", "viendraient"]
                }
            },
            {
                tr: "Yemek", inf: "manger",
                conjugations: {
                    pres: ["mange", "manges", "mange", "mangeons", "mangez", "mangent"],
                    pc: ["ai mangé", "as mangé", "a mangé", "avons mangé", "avez mangé", "ont mangé"],
                    imp: ["mangeais", "mangeais", "mangeait", "mangions", "mangiez", "mangeaient"],
                    fut: ["mangerai", "mangeras", "mangera", "mangerons", "mangerez", "mangeront"],
                    subj: ["mange", "manges", "mange", "mangions", "mangiez", "mangent"],
                    cond: ["mangerais", "mangerais", "mangerait", "mangerions", "mangeriez", "mangeraient"]
                }
            }
        ];

        const TENSES = [
            { id: 'pres', label: 'Présent', desc: "Şimdiki zaman. Fiil köküne zamana göre şahıs ekleri getirilir." },
            { id: 'pc', label: 'Passé Composé', desc: "Di'li geçmiş zaman. 'Avoir' veya 'Être' + fiilin geçmiş zaman ortacı (Participe Passé) ile kurulur." },
            { id: 'imp', label: 'Imparfait', desc: "Geçmişte süreklilik. Fiilin 'Nous' kökü alınır ve şu ekler eklenir: -ais, -ais, -ait, -ions, -iez, -aient." },
            { id: 'fut', label: 'Futur Simple', desc: "Gelecek zaman. Genellikle fiilin mastar hali kök olarak alınır ve şu ekler eklenir: -ai, -as, -a, -ons, -ez, -ont." },
            { id: 'subj', label: 'Subjonctif', desc: "İstek/Dilek kipi. Fiilin 'Ils/Elles' köküne şu ekler getirilir: -e, -es, -e, -ions, -iez, -ent." },
            { id: 'cond', label: 'Conditionnel', desc: "Koşul kipi. Futur Simple kökü üzerine Imparfait ekleri getirilir." }
        ];

        const PERSONS = [
            { label: 'Je', index: 0 },
            { label: 'Tu', index: 1 },
            { label: 'Il / Elle', index: 2 },
            { label: 'Nous', index: 3 },
            { label: 'Vous', index: 4 },
            { label: 'Ils / Elles', index: 5 }
        ];

        const ACCENTS = ['é', 'è', 'ê', 'ë', 'à', 'â', 'î', 'ï', 'ô', 'û', 'ù', 'ç'];

        function App() {
            const [view, setView] = useState('index');
            const [currentVerbIdx, setCurrentVerbIdx] = useState(0);
            const [currentTenseIdx, setCurrentTenseIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [checked, setChecked] = useState({}); 
            const [showAllCorrect, setShowAllCorrect] = useState(false);
            const [copyFeedback, setCopyFeedback] = useState(null);

            const currentVerb = VERBS_DATA[currentVerbIdx];
            const currentTense = TENSES[currentTenseIdx];
            const pageKey = `${currentVerbIdx}-${currentTenseIdx}`;
            const isPageChecked = checked[pageKey];

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyFeedback(text);
                    setTimeout(() => setCopyFeedback(null), 1500);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleInputChange = (personIdx, value) => {
                setAnswers(prev => ({ ...prev, [`${pageKey}-${personIdx}`]: value.toLowerCase() }));
            };

            const handleCheck = () => setChecked(prev => ({ ...prev, [pageKey]: true }));
            
            const handleReveal = () => {
                setShowAllCorrect(true);
                handleCheck(); // Reveal also marks the rules as visible
            };

            const handleNext = () => {
                setShowAllCorrect(false);
                if (currentTenseIdx < TENSES.length - 1) setCurrentTenseIdx(prev => prev + 1);
                else if (currentVerbIdx < VERBS_DATA.length - 1) {
                    setCurrentVerbIdx(prev => prev + 1);
                    setCurrentTenseIdx(0);
                } else setView('index');
            };

            const isTenseCompleted = (vIdx, tIdx) => checked[`${vIdx}-${tIdx}`];

            if (view === 'index') {
                return (
                    <div className="min-h-screen bg-[#f8fafc] p-6 md:p-12 text-slate-800 animate-fade-in">
                        <div className="max-w-5xl mx-auto">
                            <header className="mb-12 text-center">
                                <h1 className="text-4xl font-black text-indigo-900 mb-4 tracking-tight">Fransızca Fiil Matrisi</h1>
                                <p className="text-slate-500 text-lg font-medium">Fiil ve zaman seçerek hemen başlayın.</p>
                            </header>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {VERBS_DATA.map((verb, vIdx) => (
                                    <div key={vIdx} className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <h3 className="text-xl font-black text-slate-900">{verb.inf.toUpperCase()}</h3>
                                                <p className="text-xs text-slate-500 font-bold uppercase tracking-wide">{verb.tr}</p>
                                            </div>
                                            <div className="bg-indigo-50 text-indigo-600 p-2 rounded-xl">
                                                <IconBook />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {TENSES.map((tense, tIdx) => (
                                                <button key={tIdx} onClick={() => { setCurrentVerbIdx(vIdx); setCurrentTenseIdx(tIdx); setView('quiz'); }}
                                                    className={`text-[10px] p-2 rounded-xl font-black uppercase tracking-wider transition-all flex items-center justify-between ${isTenseCompleted(vIdx, tIdx) ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-slate-50 text-slate-600 border border-transparent hover:border-indigo-200 hover:bg-indigo-50'}`}>
                                                    {tense.label}
                                                    {isTenseCompleted(vIdx, tIdx) && <IconCheck size={12} strokeWidth={4} className="text-emerald-500" />}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f8fafc] p-4 md:p-8 text-slate-800 animate-fade-in">
                    <div className="max-w-4xl mx-auto">
                        
                        {/* Accent Toolbar */}
                        <div className="mb-6 flex flex-wrap items-center justify-center gap-2 bg-white p-3 rounded-2xl shadow-sm border border-slate-100 relative">
                            <span className="text-[10px] font-black text-slate-400 uppercase mr-2 tracking-widest">Aksanlar:</span>
                            {ACCENTS.map(char => (
                                <button key={char} onClick={() => copyToClipboard(char)} className="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-indigo-50 hover:text-indigo-600 rounded-lg font-bold text-lg transition-all border border-transparent hover:border-indigo-100">
                                    {char}
                                </button>
                            ))}
                            {copyFeedback && <div className="absolute -top-10 left-1/2 -translate-x-1/2 px-3 py-1 bg-indigo-600 text-white text-xs font-bold rounded-lg animate-bounce shadow-lg">"{copyFeedback}" Kopyalandı!</div>}
                        </div>

                        {/* Top Navigation */}
                        <div className="mb-6 flex items-center justify-between">
                            <button onClick={() => setView('index')} className="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm border border-slate-100 text-slate-600 font-bold hover:bg-slate-50 transition-all">
                                <IconHome /> <span className="hidden sm:inline">Menü</span>
                            </button>
                            <div className="flex-1 max-w-[200px] mx-4 bg-slate-200 h-2 rounded-full overflow-hidden">
                                <div className="bg-indigo-600 h-full transition-all duration-500" style={{ width: `${((currentVerbIdx * TENSES.length + currentTenseIdx + 1) / (VERBS_DATA.length * TENSES.length)) * 100}%` }} />
                            </div>
                            <div className="text-xs font-black text-slate-400 tracking-tighter bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100">
                                {currentVerbIdx + 1} / {VERBS_DATA.length} FIIL
                            </div>
                        </div>

                        {/* Main Interaction Card */}
                        <div className="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 border border-slate-100 overflow-hidden">
                            <div className="p-8 bg-indigo-600 text-white text-center">
                                <h1 className="text-4xl font-black mb-1 tracking-tight">{currentVerb.inf.toUpperCase()}</h1>
                                <p className="text-indigo-100 text-lg opacity-80 font-medium">{currentVerb.tr}</p>
                                <div className="mt-6 inline-block bg-white/10 px-6 py-2 rounded-full backdrop-blur-md border border-white/10 font-black text-sm uppercase tracking-widest">{currentTense.label}</div>
                            </div>

                            <div className="p-8 md:p-12">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                                    {PERSONS.map((person) => {
                                        const key = `${pageKey}-${person.index}`;
                                        const userValRaw = answers[key] || "";
                                        const correctVal = currentVerb.conjugations[currentTense.id][person.index].toLowerCase();
                                        const isCorrect = userValRaw.trim() === correctVal;
                                        
                                        return (
                                            <div key={person.index} className="flex flex-col gap-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1 tracking-wider">{person.label}</label>
                                                <div className="relative">
                                                    <input type="text" 
                                                        value={showAllCorrect ? correctVal : userValRaw} 
                                                        onChange={(e) => handleInputChange(person.index, e.target.value)} 
                                                        disabled={isPageChecked} 
                                                        placeholder="..."
                                                        className={`w-full p-4 rounded-2xl border-2 outline-none transition-all text-xl font-bold 
                                                            ${!isPageChecked ? 'border-slate-100 bg-slate-50/50 focus:border-indigo-500 focus:bg-white focus:shadow-xl focus:shadow-indigo-100/40' : 
                                                              (isCorrect || showAllCorrect) ? 'border-emerald-200 bg-emerald-50 text-emerald-800' : 'border-rose-100 bg-rose-50 text-rose-800'}`} />
                                                    {isPageChecked && (
                                                        <div className="absolute right-4 top-1/2 -translate-y-1/2">
                                                            {(isCorrect || showAllCorrect) ? <IconCheck size={24} strokeWidth={4} className="text-emerald-500" /> : <IconX size={24} strokeWidth={4} className="text-rose-400" />}
                                                        </div>
                                                    )}
                                                </div>
                                                {isPageChecked && !isCorrect && !showAllCorrect && (
                                                    <div className="mt-1 px-4 py-2 bg-indigo-50 rounded-xl text-xs font-black text-indigo-600 animate-fade-in">
                                                        Doğrusu: {correctVal}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Rule Explanation */}
                                {isPageChecked && (
                                    <div className="mt-12 p-6 bg-slate-50 rounded-3xl border-l-8 border-indigo-500 animate-fade-in">
                                        <div className="flex items-start gap-4">
                                            <div className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><IconInfo /></div>
                                            <div>
                                                <h4 className="font-black text-slate-900 mb-1">{currentTense.label} Kuralı</h4>
                                                <p className="text-slate-600 leading-relaxed text-sm font-medium">{currentTense.desc}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Main Buttons */}
                                <div className="mt-12 flex flex-col md:flex-row items-center justify-between gap-6">
                                    <button onClick={() => { if (currentTenseIdx > 0) setCurrentTenseIdx(prev => prev - 1); else if (currentVerbIdx > 0) { setCurrentVerbIdx(v => v-1); setCurrentTenseIdx(TENSES.length-1); } }}
                                        disabled={currentVerbIdx === 0 && currentTenseIdx === 0} className="text-slate-400 hover:text-indigo-600 font-black transition-colors disabled:opacity-0 flex items-center gap-2">
                                        <IconChevronLeft /> <span className="hidden sm:inline">Önceki</span>
                                    </button>

                                    {!isPageChecked ? (
                                        <div className="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                                            <button onClick={handleCheck} className="flex-1 px-12 py-5 bg-indigo-600 text-white rounded-2xl font-black text-xl shadow-2xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all">
                                                Kontrol Et
                                            </button>
                                            <button onClick={handleReveal} className="flex items-center justify-center gap-2 px-6 py-5 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm hover:bg-slate-200 transition-all border border-slate-200 shadow-sm">
                                                <IconEye /> Cevapları Göster
                                            </button>
                                        </div>
                                    ) : (
                                        <button onClick={handleNext} className="w-full md:w-auto px-16 py-5 bg-emerald-600 text-white rounded-2xl font-black text-xl shadow-2xl shadow-emerald-200 hover:bg-emerald-700 hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                                            Sıradaki Adım <IconArrowRight />
                                        </button>
                                    )}

                                    <div className="hidden md:block w-[100px]"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
