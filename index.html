<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Matrice des Verbes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; height: 100vh; overflow: hidden; }
        .safe-area { max-height: 100vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        /* Klavye açıldığında soru alanını sıkıştır */
        @media (max-height: 500px) {
            .hide-on-keyboard { display: none; }
            .compact-spacing { margin-bottom: 0.5rem !important; padding: 1rem !important; }
            h2 { font-size: 1.5rem !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONS ---
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconHeart = ({ filled }) => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill={filled ? "#ef4444" : "none"} stroke="#ef4444" strokeWidth="2.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconTimer = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;

        // --- DATA ---
        const PERSONS = ['JE', 'TU', 'IL', 'ELLE', 'NOUS', 'VOUS', 'ILS', 'ELLES'];
        const TENSES = [
            { id: 'pres', label: 'PRÉSENT' }, { id: 'pc', label: 'PASSÉ COMPOSÉ' }, 
            { id: 'imp', label: 'IMPARFAIT' }, { id: 'fut', label: 'FUTUR SIMPLE' }, 
            { id: 'subj', label: 'SUBJONCTIF' }, { id: 'cond', label: 'CONDITIONNEL' }
        ];

        const expand = (arr) => [arr[0], arr[1], arr[2], arr[2], arr[3], arr[4], arr[5], arr[5]];

        const VERBS_DATA = [
            { tr: "Satın Almak", inf: "acheter", conj: { pres: expand(["achète", "achètes", "achète", "achetons", "achetez", "achètent"]), pc: expand(["ai acheté", "as acheté", "a acheté", "avons acheté", "avez acheté", "ont acheté"]), imp: expand(["achetais", "achetais", "achetait", "achetions", "achetiez", "achetaient"]), fut: expand(["achèterai", "achèteras", "achètera", "achèterons", "achèterez", "achèteront"]), subj: expand(["achète", "achètes", "achète", "achetions", "achetiez", "achètent"]), cond: expand(["achèterais", "achèterais", "achèterait", "achèterions", "achèteriez", "achèteraient"]) } },
            { tr: "Sevmek", inf: "aimer", conj: { pres: expand(["aime", "aimes", "aime", "aimons", "aimez", "aiment"]), pc: expand(["ai aimé", "as aimé", "a aimé", "avons aimé", "avez aimé", "ont aimé"]), imp: expand(["aimais", "aimais", "aimait", "aimions", "aimiez", "aimaient"]), fut: expand(["aimerai", "aimeras", "aimera", "aimerons", "aimerez", "aimeront"]), subj: expand(["aime", "aimes", "aime", "aimions", "aimiez", "aiment"]), cond: expand(["aimerais", "aimerais", "aimerait", "aimerions", "aimeriez", "aimeraient"]) } },
            { tr: "Gitmek", inf: "aller", conj: { pres: expand(["vais", "vas", "va", "allons", "allez", "vont"]), pc: expand(["suis allé", "es allé", "est allé", "sommes allés", "êtes allés", "sont allés"]), imp: expand(["allais", "allais", "allait", "allions", "alliez", "allaient"]), fut: expand(["irai", "iras", "ira", "irons", "irez", "iront"]), subj: expand(["aille", "ailles", "aille", "allions", "alliez", "aillent"]), cond: expand(["irais", "irais", "irait", "irions", "iriez", "iraient"]) } },
            { tr: "Hissetmek", inf: "sentir", conj: { pres: expand(["sens", "sens", "sent", "sentons", "sentez", "sentent"]), pc: expand(["ai senti", "as senti", "a senti", "avons senti", "avez senti", "ont senti"]), imp: expand(["sentais", "sentais", "sentait", "sentions", "sentiez", "sentaient"]), fut: expand(["sentirai", "sentiras", "sentira", "sentirons", "sentirez", "sentiront"]), subj: expand(["sente", "sentes", "sente", "sentions", "sentiez", "sentent"]), cond: expand(["sentirais", "sentirais", "sentirait", "sentirions", "sentiriez", "sentiraient"]) } },
            // ... (Diğer fiiller buraya eklenebilir, yapı aynı)
        ];

        // --- APP COMPONENT ---
        function App() {
            const [view, setView] = useState('menu'); // menu, game, exercise_setup, exercise
            const [score, setScore] = useState(0);
            const [lives, setLives] = useState(3);
            const [challenge, setChallenge] = useState(null);
            const [input, setInput] = useState('');
            const [feedback, setFeedback] = useState(null);
            
            // Exercise States
            const [exTimer, setExTimer] = useState(60);
            const [exTimeLeft, setExTimeLeft] = useState(0);
            const [exCurrentPersonIdx, setExCurrentPersonIdx] = useState(0);
            const [exResults, setExResults] = useState([]);

            // Helper: Random Challenge
            const getNewChallenge = () => {
                const v = Math.floor(Math.random() * VERBS_DATA.length);
                const t = Math.floor(Math.random() * TENSES.length);
                const p = Math.floor(Math.random() * PERSONS.length);
                const ans = VERBS_DATA[v].conj[TENSES[t].id][p];
                if (ans === "-") return getNewChallenge();
                return { v, t, p, ans };
            };

            // Game Logic
            const startModeDefi = () => {
                setScore(0); setLives(3); setInput(''); setFeedback(null);
                setChallenge(getNewChallenge()); setView('game');
            };

            const checkGameAnswer = () => {
                if (feedback) return;
                if (input.trim().toLowerCase() === challenge.ans.toLowerCase()) {
                    setFeedback('correct'); setScore(s => s + 1);
                    setTimeout(() => { setChallenge(getNewChallenge()); setInput(''); setFeedback(null); }, 600);
                } else {
                    setFeedback('wrong'); setLives(l => l - 1);
                }
            };

            // Exercise Logic
            const startExercise = () => {
                const c = getNewChallenge();
                setChallenge(c);
                setExCurrentPersonIdx(0);
                setExResults([]);
                setExTimeLeft(exTimer);
                setInput('');
                setView('exercise');
            };

            useEffect(() => {
                let timer;
                if (view === 'exercise' && exTimeLeft > 0) {
                    timer = setInterval(() => setExTimeLeft(t => t - 1), 1000);
                } else if (exTimeLeft === 0 && view === 'exercise') {
                    setFeedback('timeout');
                }
                return () => clearInterval(timer);
            }, [exTimeLeft, view]);

            const checkExerciseAnswer = () => {
                const correctAnswer = VERBS_DATA[challenge.v].conj[TENSES[challenge.t].id][exCurrentPersonIdx];
                const isCorrect = input.trim().toLowerCase() === correctAnswer.toLowerCase();
                
                const newResult = { person: PERSONS[exCurrentPersonIdx], isCorrect, correct: correctAnswer };
                setExResults([...exResults, newResult]);

                if (exCurrentPersonIdx < 7) {
                    setExCurrentPersonIdx(i => i + 1);
                    setInput('');
                } else {
                    setFeedback('finished');
                }
            };

            // --- RENDER VIEWS ---
            if (view === 'menu') return (
                <div className="safe-area flex flex-col items-center p-6 text-center animate-pop">
                    <h1 className="text-4xl font-black text-slate-800 mt-10 mb-2">LA MATRICE</h1>
                    <p className="text-slate-400 font-bold mb-10">Maîtrisez les verbes français</p>
                    
                    <div className="w-full max-w-xs space-y-4">
                        <button onClick={startModeDefi} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-lg shadow-indigo-200">MODE DÉFI</button>
                        <button onClick={() => setView('exercise_setup')} className="w-full py-5 bg-white text-indigo-600 border-4 border-indigo-600 rounded-3xl font-black text-xl">MODE EXERCICE</button>
                    </div>

                    <div className="grid grid-cols-2 gap-2 mt-12 w-full max-w-md opacity-40">
                        {VERBS_DATA.slice(0, 4).map((v, i) => (
                            <div key={i} className="bg-white p-3 rounded-xl text-xs font-bold">{v.inf.toUpperCase()}</div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'exercise_setup') return (
                <div className="safe-area flex flex-col items-center p-6 justify-center min-h-screen">
                    <div className="bg-white p-8 rounded-[3rem] w-full max-w-sm shadow-xl text-center">
                        <h2 className="text-2xl font-black mb-6">TEMPS (SEC)</h2>
                        <input type="number" value={exTimer} onChange={e => setExTimer(e.target.value)} className="text-5xl font-black w-full text-center mb-8 outline-none text-indigo-600" />
                        <button onClick={startExercise} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl">COMMENCER</button>
                    </div>
                </div>
            );

            if (view === 'game' || view === 'exercise') {
                const isGame = view === 'game';
                const currentPerson = isGame ? PERSONS[challenge.p] : PERSONS[exCurrentPersonIdx];

                return (
                    <div className="safe-area flex flex-col items-center p-4 min-h-screen">
                        {/* Header */}
                        <div className="w-full max-w-md flex justify-between items-center mb-4 bg-white p-3 rounded-2xl shadow-sm">
                            <button onClick={() => setView('menu')} className="p-2 text-slate-300 hover:text-slate-600"><IconHome /></button>
                            <div className="flex gap-1">
                                {isGame ? [...Array(3)].map((_, i) => <IconHeart key={i} filled={i < lives} />) : 
                                <div className="flex items-center gap-2 font-black text-indigo-600"><IconTimer /> {exTimeLeft}s</div>}
                            </div>
                            <div className="font-black text-indigo-600">{isGame ? score : `${exCurrentPersonIdx + 1}/8`}</div>
                        </div>

                        {/* Question Box */}
                        <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-xl p-5 md:p-8 text-center animate-pop relative overflow-hidden">
                            {(lives <= 0 || feedback === 'finished' || feedback === 'timeout') ? (
                                <div className="py-6">
                                    <h2 className="text-3xl font-black mb-2">{feedback === 'timeout' ? 'TEMPS ÉCOULÉ' : 'RÉSULTAT'}</h2>
                                    {isGame ? <p className="text-4xl font-black text-indigo-600">{score} PTS</p> : 
                                    <div className="text-left mt-4 max-h-48 overflow-y-auto px-2">
                                        {exResults.map((r, i) => (
                                            <div key={i} className={`flex justify-between py-1 border-b text-sm ${r.isCorrect ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                <span>{r.person}</span> <span>{r.isCorrect ? '✔' : r.correct}</span>
                                            </div>
                                        ))}
                                    </div>}
                                    <button onClick={() => setView('menu')} className="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-black">RETOUR</button>
                                </div>
                            ) : (
                                <>
                                    <div className="compact-spacing bg-slate-50 rounded-3xl p-4 mb-4">
                                        <div className="text-[10px] font-black text-slate-400 tracking-widest uppercase">{TENSES[challenge.t].label}</div>
                                        <h2 className="text-3xl font-black text-slate-800 uppercase leading-tight">{VERBS_DATA[challenge.v].inf}</h2>
                                        <div className="text-indigo-600 font-black text-2xl mt-2 tracking-tighter">{currentPerson} ...</div>
                                    </div>

                                    <input 
                                        autoFocus
                                        type="text"
                                        value={input}
                                        onChange={e => setInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && (isGame ? checkGameAnswer() : checkExerciseAnswer())}
                                        disabled={feedback === 'wrong'}
                                        className="w-full p-4 text-xl font-bold text-center rounded-2xl border-2 border-slate-100 mb-3 outline-none focus:border-indigo-500"
                                        placeholder="Réponse..."
                                        autoComplete="off" autoCorrect="off" spellCheck="false"
                                    />

                                    {feedback === 'wrong' ? (
                                        <div className="animate-pop">
                                            <div className="p-3 bg-rose-50 text-rose-600 rounded-xl font-bold mb-3 text-sm">Correct: {challenge.ans}</div>
                                            <button onClick={() => { setChallenge(getNewChallenge()); setInput(''); setFeedback(null); if(lives<=0) setView('menu'); }} 
                                                className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">CONTINUER</button>
                                        </div>
                                    ) : (
                                        <button onClick={isGame ? checkGameAnswer : checkExerciseAnswer} 
                                            className={`w-full py-4 rounded-2xl font-black text-white transition-all ${feedback === 'correct' ? 'bg-emerald-500' : 'bg-indigo-600'}`}>
                                            {feedback === 'correct' ? 'BRAVO !' : 'VALIDER'}
                                        </button>
                                    )}
                                </>
                            )}
                        </div>
                        <div className="hide-on-keyboard h-20"></div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
