            { tr: "Geçmek / Harcamak", inf: "passer", conjugations: { pres: ["passe", "passes", "passe", "passons", "passez", "passent"], pc: ["ai passé", "as passé", "a passé", "avons passé", "avez passé", "ont passé"], imp: ["passais", "passais", "passait", "passions", "passiez", "passaient"], fut: ["passerai", "passeras", "passera", "passerons", "passerez", "passeront"], subj: ["passe", "passes", "passe", "passions", "passiez", "passent"], cond: ["passerais", "passerais", "passerait", "passerions", "passeriez", "passeraient"] } },
            { tr: "Ödemek", inf: "payer", conjugations: { pres: ["paye", "payes", "paye", "payons", "payez", "payent"], pc: ["ai payé", "as payé", "a payé", "avons payé", "avez payé", "ont payé"], imp: ["payais", "payais", "payait", "payions", "payiez", "payaient"], fut: ["payerai", "payeras", "payera", "payerons", "payerez", "payeront"], subj: ["paye", "payes", "paye", "payions", "payiez", "payent"], cond: ["payerais", "payerais", "payerait", "payerions", "payeriez", "payeraient"] } },
            { tr: "Düşünmek", inf: "penser", conjugations: { pres: ["pense", "penses", "pense", "pensons", "pensez", "pensent"], pc: ["ai pensé", "as pensé", "a pensé", "avons pensé", "avez pensé", "ont pensé"], imp: ["pensais", "pensais", "pensait", "pensions", "pensiez", "pensaient"], fut: ["penserai", "penseras", "pensera", "penserons", "penserez", "penseront"], subj: ["pense", "penses", "pense", "pensions", "pensiez", "pensent"], cond: ["penserais", "penserais", "penserait", "penserions", "penseriez", "penseraient"] } },
            { tr: "Kaybetmek", inf: "perdre", conjugations: { pres: ["perds", "perds", "perd", "perdons", "perdez", "perdent"], pc: ["ai perdu", "as perdu", "a perdu", "avons perdu", "avez perdu", "ont perdu"], imp: ["perdais", "perdais", "perdait", "perdions", "perdiez", "perdaient"], fut: ["perdrai", "perdras", "perdra", "perdrons", "perdrez", "perdront"], subj: ["perde", "perdes", "perde", "perdions", "perdiez", "perdent"], cond: ["perdrais", "perdrais", "perdrait", "perdrions", "perdriez", "perdraient"] } },
            { tr: "Yapabilmek", inf: "pouvoir", conjugations: { pres: ["peux", "peux", "peut", "pouvons", "pouvez", "peuvent"], pc: ["ai pu", "as pu", "a pu", "avons pu", "avez pu", "ont pu"], imp: ["pouvais", "pouvais", "pouvait", "pouvions", "pouviez", "pouvaient"], fut: ["pourrai", "pourras", "pourra", "pourrons", "pourrez", "pourront"], subj: ["puisse", "puisses", "puisse", "puissions", "puissiez", "puissent"], cond: ["pourrais", "pourrais", "pourrait", "pourrions", "pourriez", "pourraient"] } },
            { tr: "Almak", inf: "prendre", conjugations: { pres: ["prends", "prends", "prend", "prenons", "prenez", "prennent"], pc: ["ai pris", "as pris", "a pris", "avons pris", "avez pris", "ont pris"], imp: ["prenais", "prenais", "prenait", "prenions", "preniez", "prenaient"], fut: ["prendrai", "prendras", "prendra", "prendrons", "prendrez", "prendront"], subj: ["prenne", "prennes", "prenne", "prenions", "preniez", "prennent"], cond: ["prendrais", "prendrais", "prendrait", "prendrions", "prendriez", "prendraient"] } },
            { tr: "Bakmak", inf: "regarder", conjugations: { pres: ["regarde", "regardes", "regarde", "regardons", "regardez", "regardent"], pc: ["ai regardé", "as regardé", "a regardé", "avons regardé", "avez regardé", "ont regardé"], imp: ["regardais", "regardais", "regardait", "regardions", "regardiez", "regardaient"], fut: ["regarderai", "regarderas", "regardera", "regarderons", "regarderez", "regarderont"], subj: ["regarde", "regardes", "regarde", "regardions", "regardiez", "regardent"], cond: ["regarderais", "regarderais", "regarderait", "regarderions", "regarderiez", "regarderaient"] } },
            { tr: "Geri Vermek / Etmek", inf: "rendre", conjugations: { pres: ["rends", "rends", "rend", "rendons", "rendez", "rendent"], pc: ["ai rendu", "as rendu", "a rendu", "avons rendu", "avez rendu", "ont rendu"], imp: ["rendais", "rendais", "rendait", "rendions", "rendiez", "rendaient"], fut: ["rendrai", "rendras", "rendra", "rendrons", "rendrez", "rendront"], subj: ["rende", "rendes", "rende", "rendions", "rendiez", "rendent"], cond: ["rendrais", "rendrais", "rendrait", "rendrions", "rendriez", "rendraient"] } },
            { tr: "Geri Dönmek", inf: "rentrer", conjugations: { pres: ["rentre", "rentres", "rentre", "rentrons", "rentrez", "rentrent"], pc: ["suis rentré", "es rentré", "est rentré", "sommes rentrés", "êtes rentrés", "sont rentrés"], imp: ["rentrais", "rentrais", "rentrait", "rentrions", "rentriez", "rentraient"], fut: ["rentrerai", "rentreras", "rentrera", "rentrerons", "rentrerez", "rentreront"], subj: ["rentre", "rentres", "rentre", "rentrions", "rentriez", "rentrent"], cond: ["rentrerais", "rentrerais", "rentrerait", "rentrerions", "rentreriez", "rentreraient"] } },
            { tr: "Kalmak", inf: "rester", conjugations: { pres: ["reste", "restes", "reste", "restons", "restez", "restent"], pc: ["suis resté", "es resté", "est resté", "sommes restés", "êtes restés", "sont restés"], imp: ["restais", "restais", "restait", "restions", "restiez", "restaient"], fut: ["resterai", "resteras", "restera", "resterons", "resterez", "resteront"], subj: ["reste", "restes", "reste", "restions", "restiez", "restent"], cond: ["resterais", "resterais", "resterait", "resterions", "resteriez", "resteraient"] } },
            { tr: "Bilmek", inf: "savoir", conjugations: { pres: ["sais", "sais", "sait", "savons", "savez", "savent"], pc: ["ai su", "as su", "a su", "avons su", "avez su", "ont su"], imp: ["savais", "savais", "savait", "savions", "saviez", "savaient"], fut: ["saurai", "sauras", "saura", "saurons", "saurez", "sauront"], subj: ["sache", "saches", "sache", "sachions", "sachiez", "sachent"], cond: ["saurais", "saurais", "saurait", "saurions", "sauriez", "sauraient"] } },
            { tr: "Hissetmek", inf: "sentir", conjugations: { pres: ["sens", "sens", "sent", "sentons", "sentez", "sentent"], pc: ["ai senti", "as senti", "a senti", "avons senti", "avez senti", "ont senti"], imp: ["sentais", "sentais", "sentait", "sentions", "sentiez", "sentaient"], fut: ["sentirai", "sentiras", "sentira", "sentirons", "sentirez", "sentiront"], subj: ["sente", "sentes", "sente", "sentions", "sentiez", "sentent"], cond: ["sentirais", "sentirais", "sentirait", "sentirions", "sentiriez", "sentiraient"] } },
            { tr: "Dışarı Çıkmak", inf: "sortir", conjugations: { pres: ["sors", "sors", "sort", "sortons", "sortez", "sortent"], pc: ["suis sorti", "es sorti", "est sorti", "sommes sortis", "êtes sortis", "sont sortis"], imp: ["sortais", "sortais", "sortait", "sortions", "sortiez", "sortaient"], fut: ["sortirai", "sortiras", "sortira", "sortirons", "sortirez", "sortiront"], subj: ["sorte", "sortes", "sorte", "sortions", "sortiez", "sortent"], cond: ["sortirais", "sortirais", "sortirait", "sortirions", "sortiriez", "sortiraient"] } },
            { tr: "Tutmak", inf: "tenir", conjugations: { pres: ["tiens", "tiens", "tient", "tenons", "tenez", "tiennent"], pc: ["ai tenu", "as tenu", "a tenu", "avons tenu", "avez tenu", "ont tenu"], imp: ["tenais", "tenais", "tenait", "tenions", "teniez", "tenaient"], fut: ["tiendrai", "tiendras", "tiendra", "tiendrons", "tiendrez", "tiendront"], subj: ["tienne", "tiennes", "tienne", "tenions", "teniez", "tiennent"], cond: ["tiendrais", "tiendrais", "tiendrait", "tiendrions", "tiendriez", "tiendraient"] } },
            { tr: "Çalışmak", inf: "travailler", conjugations: { pres: ["travaille", "travailles", "travaille", "travaillons", "travaillez", "travaillent"], pc: ["ai travaillé", "as travaillé", "a travaillé", "avons travaillé", "avez travaillé", "ont travaillé"], imp: ["travaillais", "travaillais", "travaillait", "travaillions", "travailliez", "travaillaient"], fut: ["travaillerai", "travailleras", "travaillera", "travaillerons", "travaillerez", "travailleront"], subj: ["travaille", "travailles", "travaille", "travaillions", "travailliez", "travaillent"], cond: ["travaillerais", "travaillerais", "travaillerait", "travaillerions", "travailleriez", "travailleraient"] } },
            { tr: "Bulmak", inf: "trouver", conjugations: { pres: ["trouve", "trouves", "trouve", "trouvons", "trouvez", "trouvent"], pc: ["ai trouvé", "as trouvé", "a trouvé", "avons trouvé", "avez trouvé", "ont trouvé"], imp: ["trouvais", "trouvais", "trouvait", "trouvions", "trouviez", "trouvaient"], fut: ["trouverai", "trouveras", "trouvera", "trouverons", "trouverez", "trouveront"], subj: ["trouve", "trouves", "trouve", "trouvions", "trouviez", "trouvent"], cond: ["trouverais", "trouverais", "trouverait", "trouverions", "trouveriez", "trouveraient"] } },
            { tr: "Gelmek", inf: "venir", conjugations: { pres: ["viens", "viens", "vient", "venons", "venez", "viennent"], pc: ["suis venu", "es venu", "est venu", "sommes venus", "êtes venus", "sont venus"], imp: ["venais", "venais", "venait", "venions", "veniez", "venaient"], fut: ["viendrai", "viendras", "viendra", "viendrons", "viendrez", "viendront"], subj: ["vienne", "viennes", "vienne", "venions", "veniez", "viennent"], cond: ["viendrais", "viendrais", "viendrait", "viendrions", "viendriez", "viendraient"] } },
            { tr: "Yaşamak", inf: "vivre", conjugations: { pres: ["vis", "vis", "vit", "vivons", "vivez", "vivent"], pc: ["ai vécu", "as vécu", "a vécu", "avons vécu", "avez vécu", "ont vécu"], imp: ["vivais", "vivais", "vivait", "vivions", "viviez", "vivaient"], fut: ["vivrai", "vivras", "vivra", "vivrons", "vivrez", "vivront"], subj: ["vive", "vives", "vive", "vivions", "viviez", "vivent"], cond: ["vivrais", "vivrais", "vivrait", "vivrions", "vivriez", "vivraient"] } },
            { tr: "Görmek", inf: "voir", conjugations: { pres: ["vois", "vois", "voit", "voyons", "voyez", "voient"], pc: ["ai vu", "as vu", "a vu", "avons vu", "avez vu", "ont vu"], imp: ["voyais", "voyais", "voyait", "voyions", "voyiez", "voyaient"], fut: ["verrai", "verras", "verra", "verrons", "verrez", "verront"], subj: ["voie", "voies", "voie", "voyions", "voyiez", "voient"], cond: ["verrais", "verrais", "verrait", "verrions", "verriez", "verraient"] } },
            { tr: "İstemek", inf: "vouloir", conjugations: { pres: ["veux", "veux", "veut", "voulons", "voulez", "veulent"], pc: ["ai voulu", "as voulu", "a voulu", "avons voulu", "avez voulu", "ont voulu"], imp: ["voulais", "voulais", "voulait", "voulions", "vouliez", "voulaient"], fut: ["voudrai", "voudras", "voudra", "voudrons", "voudrez", "voudront"], subj: ["veuille", "veuilles", "veuille", "voulions", "vouliez", "veuillent"], cond: ["voudrais", "voudrais", "voudrait", "voudrions", "voudriez", "voudraient"] } }
        ];

        function App() {
            const [view, setView] = useState('index');
            const [gameScore, setGameScore] = useState(0);
            const [bestScore, setBestScore] = useState(0);
            const [gameLives, setGameLives] = useState(3);
            const [gameChallenge, setGameChallenge] = useState(null);
            const [gameInput, setGameInput] = useState('');
            const [gameFeedback, setGameFeedback] = useState(null);
            const [isNewRecord, setIsNewRecord] = useState(false);

            // Uygulama açıldığında rekoru hafızadan yükle
            useEffect(() => {
                const savedScore = localStorage.getItem('maxScore');
                if (savedScore) setBestScore(parseInt(savedScore));
            }, []);

            const getRandomChallenge = () => {
                let v, t, p, answer;
                do {
                    v = Math.floor(Math.random() * VERBS_DATA.length);
                    t = Math.floor(Math.random() * TENSES.length);
                    p = Math.floor(Math.random() * PERSONS.length);
                    answer = VERBS_DATA[v].conjugations[TENSES[t].id][p];
                } while (answer === "-");
                return { verbIdx: v, tenseIdx: t, personIdx: p, answer: answer };
            };

            const startGame = () => {
                setGameScore(0); 
                setGameLives(3); 
                setIsNewRecord(false);
                setGameChallenge(getRandomChallenge());
                setGameInput(''); 
                setGameFeedback(null); 
                setView('game');
            };

            const submitGameAnswer = () => {
                if (!gameChallenge || gameFeedback) return;
                const isCorrect = gameInput.trim().toLowerCase() === gameChallenge.answer.toLowerCase();
                
                if (isCorrect) {
                    setGameFeedback('correct'); 
                    const nextScore = gameScore + 1;
                    setGameScore(nextScore);
                    
                    // Rekor kırma anlık kontrolü
                    if (nextScore > bestScore) {
                        setBestScore(nextScore);
                        localStorage.setItem('maxScore', nextScore.toString());
                        setIsNewRecord(true);
                    }

                    setTimeout(() => { 
                        setGameChallenge(getRandomChallenge()); 
                        setGameInput(''); 
                        setGameFeedback(null); 
                    }, 800);
                } else {
                    setGameFeedback('wrong'); 
                    setGameLives(l => l - 1);
                }
            };

            if (view === 'index') {
                return (
                    <div className="min-h-screen p-6 animate-fade-in flex flex-col items-center">
                        <header className="mb-12 text-center w-full max-w-xl">
                            <h1 className="text-4xl font-black text-indigo-900 mb-2 tracking-tight uppercase">La Matrice des Verbes</h1>
                            
                            {/* Rekor Görüntüleme */}
                            <div className="flex items-center justify-center gap-2 mb-8 bg-indigo-50 py-2 px-4 rounded-full inline-flex">
                                <IconTrophy className="text-indigo-600" />
                                <span className="text-sm font-black text-indigo-900">MEILLEUR SCORE : {bestScore}</span>
                            </div>

                            <button onClick={startGame} className="w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl shadow-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-3">
                                MODE DÉFI
                            </button>
                        </header>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-6xl">
                            {VERBS_DATA.map((verb, vIdx) => (
                                <div key={vIdx} className="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm opacity-80">
                                    <h3 className="font-black text-slate-800 text-lg mb-1 uppercase">{verb.inf}</h3>
                                    <p className="text-[10px] text-slate-400 italic uppercase mb-3">{verb.tr}</p>
                                    <div className="flex gap-1 overflow-x-auto pb-1 no-scrollbar">
                                        {TENSES.map((t, ti) => <div key={ti} className="bg-slate-50 text-[7px] font-black p-1 px-2 rounded text-slate-300 flex-shrink-0">{t.label}</div>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'game') {
                const isGameOver = gameLives <= 0;
                return (
                    <div className="min-h-screen p-4 flex flex-col items-center game-container animate-fade-in">
                        <div className="w-full max-w-md flex justify-between items-center mb-10 header-bar bg-white p-4 rounded-[2rem] shadow-sm border border-slate-50">
                            <button onClick={() => setView('index')} className="p-3 bg-slate-50 rounded-2xl text-slate-400"><IconHome /></button>
                            <div className="flex gap-1">
                                {[...Array(3)].map((_, i) => <IconHeart key={i} filled={i < gameLives} />)}
                            </div>
                            <div className="font-black text-slate-400 text-xl"><span className="text-indigo-600">{gameScore}</span> <span className="text-[10px]">PTS</span></div>
                        </div>

                        <div className="w-full max-w-md bg-white rounded-[3.5rem] shadow-2xl border border-slate-50 p-6 flex flex-col overflow-hidden relative">
                            {isGameOver ? (
                                <div className="p-10 text-center animate-fade-in">
                                    <h2 className="text-5xl font-black text-slate-900 mb-2 tracking-tighter">FIN !</h2>
                                    <div className="flex flex-col gap-2 mb-10">
                                        <p className="text-slate-400 font-bold text-2xl tracking-tight">Score : {gameScore}</p>
                                        {isNewRecord && (
                                            <div className="text-emerald-500 font-black text-lg bg-emerald-50 py-2 px-4 rounded-full animate-bounce">
                                                NOUVEAU RECORD ! 🏆
                                            </div>
                                        )}
                                    </div>
                                    <button onClick={startGame} className="w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl shadow-xl">REJOUER</button>
                                </div>
                            ) : (
                                <>
                                    <div className="bg-[#ebf0ff] rounded-[2.5rem] p-8 mb-6 text-center question-box animate-fade-in border-2 border-[#dde5ff]">
                                        <div className="text-sm font-black text-indigo-300 uppercase tracking-widest mb-1">{TENSES[gameChallenge.tenseIdx].label}</div>
                                        <h2 className="text-5xl font-black text-indigo-900 mb-1 tracking-tight uppercase">{VERBS_DATA[gameChallenge.verbIdx].inf}</h2>
                                        <p className="text-slate-500 italic mb-6 text-sm">{VERBS_DATA[gameChallenge.verbIdx].tr}</p>
                                        <div className="text-indigo-700 font-black text-3xl">{PERSONS[gameChallenge.personIdx].label} ...</div>
                                    </div>

                                    <div className="mb-6">
                                        <input 
                                            autoFocus 
                                            type="text" 
                                            value={gameInput} 
                                            onChange={(e) => setGameInput(e.target.value)} 
                                            onKeyDown={(e) => e.key === 'Enter' && submitGameAnswer()}
                                            disabled={gameFeedback === 'wrong'}
                                            className="w-full p-6 text-2xl font-black text-center rounded-[2rem] border-2 border-slate-100 outline-none focus:border-indigo-200 transition-all bg-white text-slate-800 placeholder-slate-100" 
                                            placeholder="..." 
                                            autoComplete="off"
                                            autoCorrect="off"
                                            spellCheck="false"
                                        />
                                    </div>

                                    {gameFeedback === 'wrong' ? (
                                        <div className="animate-fade-in">
                                            <div className="p-5 bg-rose-50 text-rose-600 rounded-[2rem] font-black text-center mb-4 text-xl border-2 border-rose-100">
                                                C'était : {gameChallenge.answer}
                                            </div>
                                            <button onClick={() => {setGameChallenge(getRandomChallenge()); setGameInput(''); setGameFeedback(null);}} 
                                                className="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-black text-xl shadow-lg">CONTINUER</button>
                                        </div>
                                    ) : (
                                        <button onClick={submitGameAnswer} 
                                            className={`w-full py-6 rounded-[2rem] font-black text-2xl shadow-xl transition-all ${gameFeedback === 'correct' ? 'bg-emerald-500 text-white' : 'bg-indigo-600 text-white active:scale-95'}`}>
                                            {gameFeedback === 'correct' ? 'EXCELLENT !' : 'VÉRIFIER'}
                                        </button>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
