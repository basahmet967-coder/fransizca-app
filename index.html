<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Matrice des Verbes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PERSONS = ['JE', 'TU', 'IL', 'ELLE', 'NOUS', 'VOUS', 'ILS', 'ELLES'];
        const TENSES = [
            { id: 'pres', label: 'PRÉSENT' }, { id: 'pc', label: 'PASSÉ COMPOSÉ' }, 
            { id: 'imp', label: 'IMPARFAIT' }, { id: 'fut', label: 'FUTUR SIMPLE' }, 
            { id: 'subj', label: 'SUBJONCTIF' }, { id: 'cond', label: 'CONDITIONNEL' }
        ];

        const expand = (arr) => [arr[0], arr[1], arr[2], arr[2], arr[3], arr[4], arr[5], arr[5]];

        const VERBS_DATA = [
            { tr: "Satın Almak", inf: "acheter", conj: { pres: expand(["achète", "achètes", "achète", "achetons", "achetez", "achètent"]), pc: expand(["ai acheté", "as acheté", "a acheté", "avons acheté", "avez acheté", "ont acheté"]), imp: expand(["achetais", "achetais", "achetait", "achetions", "achetiez", "achetaient"]), fut: expand(["achèterai", "achèteras", "achètera", "achèterons", "achèterez", "achèteront"]), subj: expand(["achète", "achètes", "achète", "achetions", "achetiez", "achètent"]), cond: expand(["achèterais", "achèterais", "achèterait", "achèterions", "achèteriez", "achèteraient"]) } },
            { tr: "Sevmek", inf: "aimer", conj: { pres: expand(["aime", "aimes", "aime", "aimons", "aimez", "aiment"]), pc: expand(["ai aimé", "as aimé", "a aimé", "avons aimé", "avez aimé", "ont aimé"]), imp: expand(["aimais", "aimais", "aimait", "aimions", "aimiez", "aimaient"]), fut: expand(["aimerai", "aimeras", "aimera", "aimerons", "aimerez", "aimeront"]), subj: expand(["aime", "aimes", "aime", "aimions", "aimiez", "aiment"]), cond: expand(["aimerais", "aimerais", "aimerait", "aimerions", "aimeriez", "aimeraient"]) } },
            { tr: "Gitmek", inf: "aller", conj: { pres: expand(["vais", "vas", "va", "allons", "allez", "vont"]), pc: expand(["suis allé", "es allé", "est allé", "sommes allés", "êtes allés", "sont allés"]), imp: expand(["allais", "allais", "allait", "allions", "alliez", "allaient"]), fut: expand(["irai", "iras", "ira", "irons", "irez", "iront"]), subj: expand(["aille", "ailles", "aille", "allions", "alliez", "aillent"]), cond: expand(["irais", "irais", "irait", "irions", "iriez", "iraient"]) } },
            { tr: "Hissetmek", inf: "sentir", conj: { pres: expand(["sens", "sens", "sent", "sentons", "sentez", "sentent"]), pc: expand(["ai senti", "as senti", "a senti", "avons senti", "avez senti", "ont senti"]), imp: expand(["sentais", "sentais", "sentait", "sentions", "sentiez", "sentaient"]), fut: expand(["sentirai", "sentiras", "sentira", "sentirons", "sentirez", "sentiront"]), subj: expand(["sente", "sentes", "sente", "sentions", "sentiez", "sentent"]), cond: expand(["sentirais", "sentirais", "sentirait", "sentirions", "sentiriez", "sentiraient"]) } },
            { tr: "Yapmak", inf: "faire", conj: { pres: expand(["fais", "fais", "fait", "faisons", "faites", "font"]), pc: expand(["ai fait", "as fait", "a fait", "avons fait", "avez fait", "ont fait"]), imp: expand(["faisais", "faisais", "faisait", "faisions", "faisiez", "faisaient"]), fut: expand(["ferai", "feras", "fera", "ferons", "ferez", "feront"]), subj: expand(["fasse", "fasses", "fasse", "fassions", "fassiez", "fassent"]), cond: expand(["ferais", "ferais", "ferait", "ferions", "feriez", "feraient"]) } },
            // ... (Diğer 45 fiil aynı şekilde buraya gelecek)
        ];

        function App() {
            const [view, setView] = useState('home'); // home, exercise, game
            const [selectedVerb, setSelectedVerb] = useState(null);
            const [selectedTense, setSelectedTense] = useState(null);
            const [inputs, setInputs] = useState(Array(8).fill(''));
            const [showResults, setShowResults] = useState(false);

            // Oyun Modu State (Opsiyonel Eklenti)
            const [gameScore, setGameScore] = useState(0);
            const [gameChallenge, setGameChallenge] = useState(null);

            const openExercise = (verb, tense) => {
                setSelectedVerb(verb);
                setSelectedTense(tense);
                setInputs(Array(8).fill(''));
                setShowResults(false);
                setView('exercise');
            };

            const checkExercise = () => setShowResults(true);
            const revealAnswers = () => {
                const correctOnes = selectedVerb.conj[selectedTense.id];
                setInputs(correctOnes);
                setShowResults(true);
            };

            // ANA SAYFA
            if (view === 'home') return (
                <div className="p-6 max-w-6xl mx-auto">
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-3xl font-black text-indigo-900">LA MATRICE</h1>
                            <p className="text-slate-400 text-sm font-bold uppercase tracking-widest">Exercices de Conjugaison</p>
                        </div>
                        <button onClick={() => setView('game')} className="bg-amber-400 text-amber-900 px-6 py-2 rounded-full font-black text-sm shadow-lg hover:bg-amber-500 transition-all">MODE DÉFI 🏆</button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {VERBS_DATA.map((verb, idx) => (
                            <div key={idx} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                                <div className="mb-3">
                                    <h3 className="text-xl font-black text-slate-800 uppercase">{verb.inf}</h3>
                                    <p className="text-xs text-slate-400 italic font-bold">{verb.tr}</p>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {TENSES.map(tense => (
                                        <button 
                                            key={tense.id} 
                                            onClick={() => openExercise(verb, tense)}
                                            className="text-[10px] font-black px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition-colors"
                                        >
                                            {tense.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // EXERCISE MODU (ASIL MOD)
            if (view === 'exercise') {
                const correctAnswers = selectedVerb.conj[selectedTense.id];
                return (
                    <div className="min-h-screen bg-slate-50 p-4 flex flex-col items-center">
                        <div className="w-full max-w-xl bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100">
                            <div className="bg-indigo-600 p-8 text-white text-center relative">
                                <button onClick={() => setView('home')} className="absolute left-6 top-8 text-indigo-200 font-bold">← RETOUR</button>
                                <p className="text-xs font-black tracking-[0.2em] opacity-70 mb-1 uppercase">{selectedTense.label}</p>
                                <h2 className="text-4xl font-black uppercase">{selectedVerb.inf}</h2>
                            </div>

                            <div className="p-6 space-y-3">
                                {PERSONS.map((person, i) => (
                                    <div key={i} className="flex items-center gap-4">
                                        <label className="w-16 text-right font-black text-slate-400 text-sm">{person}</label>
                                        <input 
                                            type="text" 
                                            value={inputs[i]}
                                            onChange={(e) => {
                                                const newInputs = [...inputs];
                                                newInputs[i] = e.target.value;
                                                setInputs(newInputs);
                                            }}
                                            className={`flex-1 p-3 rounded-xl border-2 font-bold transition-all ${
                                                showResults 
                                                ? (inputs[i].trim().toLowerCase() === correctAnswers[i].toLowerCase() ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-rose-500 bg-rose-50 text-rose-700')
                                                : 'border-slate-100 bg-slate-50'
                                            }`}
                                        />
                                        {showResults && (
                                            <div className="text-[10px] font-black text-slate-300 w-24 truncate">
                                                {correctAnswers[i]}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="p-6 bg-slate-50 flex gap-3">
                                <button onClick={checkExercise} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 uppercase tracking-widest">Vérifier</button>
                                <button onClick={revealAnswers} className="flex-1 py-4 bg-white text-slate-400 border-2 border-slate-200 rounded-2xl font-black uppercase tracking-widest text-sm">Montrer</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // OYUN MODU (OPSİYONEL EK)
            if (view === 'game') return (
                <div className="p-10 text-center">
                    <h2 className="text-2xl font-black mb-4 tracking-tighter">MODE DÉFI (Bientôt...)</h2>
                    <button onClick={() => setView('home')} className="text-indigo-600 font-bold uppercase">Retour à la liste</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
